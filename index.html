<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>ai.econcours.ma | Plateforme Carrière IA</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-secondary: #64748b;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-light: #eef2ff;
      --accent: #7c3aed;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --error-bg: #fef2f2;
      --radius-sm: 0.75rem;
      --radius: 1rem;
      --radius-lg: 1.5rem;
      --radius-xl: 2rem;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
      --shadow-md: 0 8px 30px rgba(0,0,0,0.06);
      --shadow-lg: 0 20px 50px rgba(0,0,0,0.08);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --max-width: 1200px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    /* Navigation */
    .nav {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.3px;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
    }

    .nav-logo .dot {
      width: 8px; height: 8px;
      background: var(--primary);
      border-radius: 50%;
    }

    .nav-btn {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .nav-btn:hover {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
    }

    /* Main */
    .main-container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    .page {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -0.8px;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }

    .hero .highlight {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      max-width: 550px;
      margin: 0 auto;
    }

    /* Catégories */
    .category-section {
      margin-bottom: 2.5rem;
    }

    .category-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .category-icon {
      width: 36px; height: 36px;
      border-radius: var(--radius-sm);
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .service-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      cursor: pointer;
    }

    .service-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: #c7d2fe;
    }

    .service-card h4 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .service-card p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      flex: 1;
    }

    .service-card .service-icon-sm {
      font-size: 1.5rem;
    }

    /* Boutons */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 2.5rem;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      letter-spacing: -0.2px;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 14px rgba(79,70,229,0.25);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
      box-shadow: 0 8px 22px rgba(79,70,229,0.35);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-outline {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-outline:hover { background: #f1f5f9; }

    .btn-ghost {
      background: transparent;
      color: var(--primary);
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }

    .btn-ghost:hover { background: var(--primary-light); }

    .btn-full { width: 100%; }
    .btn-small { padding: 0.5rem 1.1rem; font-size: 0.82rem; }

    /* Service page */
    .service-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .back-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .back-btn:hover { background: #f1f5f9; }

    .service-title {
      font-size: 1.4rem;
      font-weight: 700;
    }

    /* Formulaire */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2rem;
      box-shadow: var(--shadow-sm);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
    }

    .form-group input,
    .form-group textarea {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      font-family: inherit;
      transition: var(--transition);
      outline: none;
      width: 100%;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
    }

    .form-group input.error,
    .form-group textarea.error {
      border-color: var(--error);
      background: var(--error-bg);
    }

    textarea { resize: vertical; min-height: 80px; }

    .style-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 0.25rem;
    }

    .style-row span { font-weight: 600; font-size: 0.85rem; }

    .radio-group {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-weight: 500;
      text-transform: none;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .error-message {
      color: var(--error);
      font-size: 0.85rem;
      font-weight: 500;
      display: none;
      margin-top: 0.5rem;
    }

    .error-message.visible { display: block; }

    /* Loader */
    .loader-inline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 2.5rem;
      color: var(--primary);
      font-weight: 500;
    }

    .spinner {
      width: 22px; height: 22px;
      border: 2.5px solid #e2e8f0;
      border-top: 2.5px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Résultat */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 1.75rem;
      box-shadow: var(--shadow-sm);
      margin-top: 1.5rem;
      display: none;
      animation: fadeIn 0.35s ease;
    }

    .result-card.visible { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .result-badge {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 700;
      font-size: 0.8rem;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .result-body {
      background: #f8fafc;
      border: 1px solid #f1f5f9;
      border-radius: var(--radius);
      padding: 1.25rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.95rem;
      max-height: 400px;
      overflow-y: auto;
    }

    .result-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    /* Interview */
    .interview-chat {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 1rem;
    }

    .chat-bubble {
      padding: 0.9rem 1.2rem;
      border-radius: var(--radius-lg);
      max-width: 80%;
      line-height: 1.5;
    }

    .chat-bubble.ai {
      background: var(--primary-light);
      align-self: flex-start;
      border-bottom-left-radius: 0.25rem;
    }

    .chat-bubble.user {
      background: #e2e8f0;
      align-self: flex-end;
      border-bottom-right-radius: 0.25rem;
    }

    .interview-input-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .interview-input-row input {
      flex: 1;
    }

    .score-display {
      background: var(--primary-light);
      padding: 1rem;
      border-radius: var(--radius);
      text-align: center;
      font-weight: 700;
      font-size: 1.1rem;
      margin-top: 1rem;
    }

    /* Suggestions */
    .suggestions {
      margin-top: 1.75rem;
    }

    .suggestions p {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }

    .suggestions-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
    }

    .footer-note {
      text-align: center;
      color: #94a3b8;
      font-size: 0.8rem;
      margin-top: 2.5rem;
    }

    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-card { padding: 1.25rem; }
      .services-grid { grid-template-columns: 1fr; }
      .chat-bubble { max-width: 90%; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-logo" id="homeLogo">ai.econcours.ma<span class="dot"></span></a>
    <button class="nav-btn" id="navHome">🏠 Accueil</button>
  </nav>

  <div class="main-container">
    <!-- PAGE ACCUEIL -->
    <div class="page active" id="pageHome">
      <div class="hero">
        <h1>Votre <span class="highlight">carrière</span>, propulsée par l'IA</h1>
        <p>Une plateforme complète pour créer des candidatures parfaites et vous préparer aux entretiens.</p>
      </div>

      <div id="categoriesContainer"></div>
      <div class="footer-note">Propulsé par IA · Groq</div>
    </div>

    <!-- PAGE SERVICE -->
    <div class="page" id="pageService">
      <div class="service-header">
        <button class="back-btn" id="backBtn">←</button>
        <h2 class="service-title" id="serviceTitle">Service</h2>
      </div>
      <div id="serviceContent"></div>
    </div>
  </div>

  <script>
    (function() {
      const GROQ_API_KEY = "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";
      const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
      const MODEL = "llama-3.3-70b-versatile";

      // Structure des catégories et services
      const CATEGORIES = [
        {
          id: 'candidature',
          title: '📝 Candidature',
          icon: '📝',
          services: [
            { id: 'email', title: 'Email de candidature', desc: 'Rédigez un email professionnel percutant.', icon: '📧', category: 'candidature' },
            { id: 'lettre', title: 'Lettre de motivation', desc: 'Créez une lettre complète et convaincante.', icon: '📄', category: 'candidature' },
            { id: 'resume', title: 'Résumé CV', desc: 'Un profil professionnel qui se démarque.', icon: '👤', category: 'candidature' },
          ]
        },
        {
          id: 'preparation',
          title: '🎯 Préparation',
          icon: '🎯',
          services: [
            { id: 'interview', title: 'Simulation d\'entretien', desc: 'L\'IA vous pose des questions et évalue vos réponses.', icon: '🎤', category: 'preparation' },
            { id: 'answers', title: 'Générateur de réponses', desc: 'Des réponses parfaites aux questions fréquentes.', icon: '💡', category: 'preparation' },
          ]
        },
        {
          id: 'profil',
          title: '👔 Profil',
          icon: '👔',
          services: [
            { id: 'linkedin', title: 'Bio LinkedIn', desc: 'Une biographie professionnelle optimisée.', icon: '🔗', category: 'profil' },
            { id: 'headline', title: 'Titre professionnel', desc: 'Un titre accrocheur pour votre profil.', icon: '✨', category: 'profil' },
            { id: 'objective', title: 'Objectif de carrière', desc: 'Définissez votre projet professionnel.', icon: '🎯', category: 'profil' },
          ]
        },
        {
          id: 'amelioration',
          title: '🔧 Amélioration',
          icon: '🔧',
          services: [
            { id: 'skills', title: 'Améliorer compétences', desc: 'Optimisez la présentation de vos compétences.', icon: '⚡', category: 'amelioration' },
            { id: 'rewrite', title: 'Corriger et réécrire', desc: 'Améliorez un texte existant.', icon: '✍️', category: 'amelioration' },
          ]
        }
      ];

      const ALL_SERVICES = CATEGORIES.flatMap(c => c.services);

      let currentService = null;

      // DOM
      const pageHome = document.getElementById('pageHome');
      const pageService = document.getElementById('pageService');
      const serviceTitle = document.getElementById('serviceTitle');
      const serviceContent = document.getElementById('serviceContent');
      const categoriesContainer = document.getElementById('categoriesContainer');

      // Navigation
      function showHome() {
        pageHome.classList.add('active');
        pageService.classList.remove('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function showService(serviceId) {
        const service = ALL_SERVICES.find(s => s.id === serviceId);
        if (!service) return;
        currentService = service;
        serviceTitle.textContent = `${service.icon} ${service.title}`;
        pageHome.classList.remove('active');
        pageService.classList.add('active');
        renderServicePage(service);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      // Rendu page d'accueil
      function renderHome() {
        let html = '';
        CATEGORIES.forEach(cat => {
          html += `
            <div class="category-section">
              <div class="category-title">
                <span class="category-icon">${cat.icon}</span>
                ${cat.title}
              </div>
              <div class="services-grid">
                ${cat.services.map(svc => `
                  <div class="service-card" data-service="${svc.id}">
                    <div class="service-icon-sm">${svc.icon}</div>
                    <h4>${svc.title}</h4>
                    <p>${svc.desc}</p>
                    <button class="btn btn-primary btn-small" data-service="${svc.id}">Lancer</button>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        });
        categoriesContainer.innerHTML = html;

        // Événements
        categoriesContainer.querySelectorAll('[data-service]').forEach(el => {
          el.addEventListener('click', (e) => {
            const id = el.dataset.service;
            if (id) showService(id);
          });
        });
      }

      // API Groq
      async function callGroq(systemPrompt, userPrompt) {
        const response = await fetch(GROQ_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${GROQ_API_KEY}`
          },
          body: JSON.stringify({
            model: MODEL,
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: userPrompt }
            ],
            temperature: 0.9,
            max_tokens: 800,
          })
        });
        if (!response.ok) throw new Error(`Erreur API (${response.status})`);
        const data = await response.json();
        return data.choices[0].message.content.trim();
      }

      // Rendu page service
      function renderServicePage(service) {
        if (service.id === 'interview') {
          renderInterviewPage();
        } else if (service.id === 'rewrite') {
          renderRewritePage();
        } else if (service.id === 'answers') {
          renderAnswersPage();
        } else {
          renderStandardService(service);
        }
      }

      // Service standard (formulaire + résultat)
      function renderStandardService(service) {
        serviceContent.innerHTML = `
          <div class="form-card">
            <div class="form-grid">
              <div class="form-group">
                <label>Nom complet *</label>
                <input type="text" id="inputName" placeholder="Votre nom complet">
              </div>
              <div class="form-group">
                <label>Ville *</label>
                <input type="text" id="inputCity" placeholder="Votre ville">
              </div>
              <div class="form-group">
                <label>Diplôme</label>
                <input type="text" id="inputDegree" placeholder="Votre diplôme">
              </div>
              <div class="form-group">
                <label>Type de poste *</label>
                <input type="text" id="inputJob" placeholder="Poste recherché">
              </div>
              <div class="form-group full">
                <label>Compétences *</label>
                <textarea id="inputSkills" rows="2" placeholder="Vos compétences (séparées par des virgules)"></textarea>
              </div>
            </div>
            <div class="style-row">
              <span>Style :</span>
              <div class="radio-group">
                <label><input type="radio" name="svcStyle" value="Formel" checked> Formel</label>
                <label><input type="radio" name="svcStyle" value="Normal"> Normal</label>
                <label><input type="radio" name="svcStyle" value="Très professionnel"> Très pro</label>
              </div>
            </div>
            <div class="error-message" id="errorMessage">⚠️ Veuillez remplir tous les champs obligatoires</div>
            <button class="btn btn-primary btn-full" id="generateBtn" style="margin-top:1rem;" disabled>✨ Générer</button>
          </div>
          <div id="serviceLoader" class="loader-inline" style="display:none;"><div class="spinner"></div> Génération...</div>
          <div class="result-card" id="resultCard">
            <div class="result-header"><span class="result-badge" id="resultBadge">Résultat</span></div>
            <div class="result-body" id="resultBody"></div>
            <div class="result-actions">
              <button class="btn btn-outline" id="copyBtn">📋 Copier</button>
              <button class="btn btn-ghost" id="regenerateBtn">🔄 Regénérer</button>
            </div>
          </div>
          <div class="suggestions" id="suggestionsBox" style="display:none;">
            <p>💡 Explorer d'autres services :</p>
            <div class="suggestions-grid" id="suggestionsGrid"></div>
          </div>
        `;

        setupStandardService(service);
      }

      function setupStandardService(service) {
        const inputName = document.getElementById('inputName');
        const inputCity = document.getElementById('inputCity');
        const inputJob = document.getElementById('inputJob');
        const inputSkills = document.getElementById('inputSkills');
        const generateBtn = document.getElementById('generateBtn');
        const errorMsg = document.getElementById('errorMessage');
        const loader = document.getElementById('serviceLoader');
        const resultCard = document.getElementById('resultCard');
        const resultBody = document.getElementById('resultBody');
        const resultBadge = document.getElementById('resultBadge');
        const suggestionsBox = document.getElementById('suggestionsBox');
        const suggestionsGrid = document.getElementById('suggestionsGrid');
        let lastContent = '';

        function checkForm() {
          const valid = inputName.value.trim() && inputCity.value.trim() && inputJob.value.trim() && inputSkills.value.trim();
          generateBtn.disabled = !valid;
          if (valid) errorMsg.classList.remove('visible');
        }

        [inputName, inputCity, inputJob, inputSkills].forEach(el => el.addEventListener('input', checkForm));

        generateBtn.addEventListener('click', async () => {
          const name = inputName.value.trim();
          const city = inputCity.value.trim();
          const job = inputJob.value.trim();
          const skills = inputSkills.value.trim();
          if (!name || !city || !job || !skills) {
            errorMsg.classList.add('visible');
            return;
          }
          errorMsg.classList.remove('visible');
          loader.style.display = 'flex';
          resultCard.classList.remove('visible');
          suggestionsBox.style.display = 'none';

              skills: `Optimise ces compétences pour CV : "${user.skills}". Regroupe par catégories.`,
              linkedin: `Rédige une bio LinkedIn professionnelle. Candidat: ${user.fullName}. Compétences: ${user.skills}. Poste: ${user.jobType}. Style: ${user.style}.`,
              headline: `Crée un titre professionnel accrocheur pour LinkedIn/CV. Candidat: ${user.fullName}. Poste: ${user.jobType}. Compétences: ${user.skills}.`,

            };
            const prompt = prompts[service.id] || `Génère un contenu pour : ${service.title}. Candidat: ${user.fullName}. Compétences: ${user.skills}.`;
            
            const content = await callGroq("Tu es un expert en recrutement. Réponds uniquement en français.", prompt);

            resultBody.textContent = "Erreur lors de la génération.";

          } finally {
            loader.style.display = 'none';
          }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
          if (lastContent) navigator.clipboard.writeText(lastContent).then(() => alert('✅ Copié !'));
        });
        document.getElementById('regenerateBtn').addEventListener('click', () => generateBtn.click());
      }

      // Interview simulation
      function renderInterviewPage() {
        serviceContent.innerHTML = `
          <div class="form-card">
            <div class="form-group">
              <label>Poste visé *</label>
              <input type="text" id="interviewJob" placeholder="Poste pour lequel vous passez l'entretien">
            </div>
            <div class="form-group">
              <label>Entreprise (optionnel)</label>
              <input type="text" id="interviewCompany" placeholder="Nom de l'entreprise">
            </div>
            <div class="error-message" id="errorMessage">⚠️ Veuillez indiquer le poste</div>
            <button class="btn btn-primary btn-full" id="startInterviewBtn" disabled>🎤 Démarrer la simulation</button>
          </div>
          <div class="result-card" id="interviewCard" style="display:none;">
            <div class="result-header"><span class="result-badge">🎤 Simulation d'entretien</span></div>
            <div class="interview-chat" id="interviewChat"></div>
            <div class="interview-input-row" id="interviewInputRow">
              <input type="text" id="userAnswer" placeholder="Votre réponse...">
              <button class="btn btn-primary" id="sendAnswerBtn">Envoyer</button>
            </div>
            <div class="score-display" id="scoreDisplay" style="display:none;"></div>
            <button class="btn btn-outline btn-full" id="restartInterviewBtn" style="display:none; margin-top:1rem;">🔄 Recommencer</button>
          </div>
        `;

        const jobInput = document.getElementById('interviewJob');
        const companyInput = document.getElementById('interviewCompany');
        const startBtn = document.getElementById('startInterviewBtn');
        const errorMsg = document.getElementById('errorMessage');
        const interviewCard = document.getElementById('interviewCard');
        const chatDiv = document.getElementById('interviewChat');
        const answerInput = document.getElementById('userAnswer');
        const sendBtn = document.getElementById('sendAnswerBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const restartBtn = document.getElementById('restartInterviewBtn');
        const inputRow = document.getElementById('interviewInputRow');

        let questions = [];
        let answers = [];
        let currentQ = 0;
        const TOTAL_QUESTIONS = 4;

        jobInput.addEventListener('input', () => {
          startBtn.disabled = !jobInput.value.trim();
          if (jobInput.value.trim()) errorMsg.classList.remove('visible');
        });

        startBtn.addEventListener('click', async () => {
          if (!jobInput.value.trim()) { errorMsg.classList.add('visible'); return; }
          errorMsg.classList.remove('visible');
          interviewCard.style.display = 'block';
          chatDiv.innerHTML = '<div class="loader-inline"><div class="spinner"></div> Préparation des questions...</div>';
          inputRow.style.display = 'none';
          scoreDisplay.style.display = 'none';
          restartBtn.style.display = 'none';
          answers = [];
          currentQ = 0;

          const job = jobInput.value.trim();
          const company = companyInput.value.trim() || 'une entreprise';
          
          try {
            const qPrompt = `Génère exactement ${TOTAL_QUESTIONS} questions d'entretien en français pour un poste de "${job}" chez "${company}". Retourne uniquement les questions numérotées, une par ligne. Varie les types (compétences, motivation, expérience, comportement).`;
            const qText = await callGroq("Tu es un recruteur expert. Réponds uniquement en français.", qPrompt);
            questions = qText.split('\n').filter(q => q.trim() && /\d/.test(q)).map(q => q.replace(/^\d+[\.\)]\s*/, '').trim());
            if (questions.length < 2) questions = ["Parlez-moi de vous.", "Pourquoi ce poste ?", "Vos principales qualités ?", "Où vous voyez-vous dans 3 ans ?"];
            if (questions.length > TOTAL_QUESTIONS) questions = questions.slice(0, TOTAL_QUESTIONS);
            
            chatDiv.innerHTML = '';
            addChatBubble('ai', `Bonjour ! Je vais vous poser ${questions.length} questions pour le poste de <strong>${job}</strong> chez <strong>${company}</strong>. Répondez naturellement.`);
            setTimeout(() => {
              addChatBubble('ai', `Question 1/${questions.length} : ${questions[0]}`);
              inputRow.style.display = 'flex';
              answerInput.focus();
            }, 800);
          } catch (e) {
            chatDiv.innerHTML = '<p>Erreur lors de la génération des questions.</p>';
          }
        });

        sendBtn.addEventListener('click', async () => {
          const answer = answerInput.value.trim();
          if (!answer) return;
          addChatBubble('user', answer);
          answers.push({ question: questions[currentQ], answer });
          answerInput.value = '';
          currentQ++;

          if (currentQ < questions.length) {
            addChatBubble('ai', `Question ${currentQ + 1}/${questions.length} : ${questions[currentQ]}`);
          } else {
            inputRow.style.display = 'none';
            addChatBubble('ai', "Merci ! J'évalue vos réponses...");
            
            try {
              const evalPrompt = `Évalue ces réponses d'entretien pour un poste. Donne un score sur 10 et un feedback constructif en français. Questions et réponses: ${JSON.stringify(answers)}`;
              const feedback = await callGroq("Tu es un coach en entretien. Réponds uniquement en français.", evalPrompt);
              scoreDisplay.innerHTML = `📊 Évaluation :<br>${feedback}`;
              scoreDisplay.style.display = 'block';
            } catch (e) {
              scoreDisplay.innerHTML = "Évaluation non disponible.";
              scoreDisplay.style.display = 'block';
            }
            restartBtn.style.display = 'block';
          }
          chatDiv.scrollTop = chatDiv.scrollHeight;
        });

        answerInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') sendBtn.click();
        });

        restartBtn.addEventListener('click', () => {
          interviewCard.style.display = 'none';
          chatDiv.innerHTML = '';
          scoreDisplay.style.display = 'none';
          restartBtn.style.display = 'none';
          startBtn.click();
        });

        function addChatBubble(type, text) {
          const div = document.createElement('div');
          div.className = `chat-bubble ${type}`;
          div.innerHTML = text;
          chatDiv.appendChild(div);
          chatDiv.scrollTop = chatDiv.scrollHeight;
        }
      }

      function showSuggestions(excludeId, grid, box) {
        const others = ALL_SERVICES.filter(s => s.id !== excludeId).slice(0, 4);
        grid.innerHTML = others.map(s => `<button class="btn btn-outline btn-small suggest-btn" data-service="${s.id}">${s.icon} ${s.title}</button>`).join('');
        box.style.display = 'block';
        grid.querySelectorAll('.suggest-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.service;
            if (id) showService(id);
          });
        });
      }

      // Événements globaux
      document.getElementById('homeLogo').addEventListener('click', (e) => { e.preventDefault(); showHome(); });
      document.getElementById('navHome').addEventListener('click', showHome);
      document.getElementById('backBtn').addEventListener('click', showHome);

      // Initialisation
      renderHome();

    })();
  </script>
