<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>ai.econcours.ma | Plateforme Carrière IA</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e8ecf1;
      --text: #0f172a;
      --text-secondary: #5b6170;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-light: #eef2ff;
      --primary-soft: #f5f3ff;
      --success: #10b981;
      --error: #ef4444;
      --error-bg: #fef2f2;
      --radius-sm: 0.75rem;
      --radius: 1rem;
      --radius-lg: 1.25rem;
      --radius-xl: 1.75rem;
      --shadow-xs: 0 1px 2px rgba(0,0,0,0.03);
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.04);
      --shadow-md: 0 12px 32px rgba(0,0,0,0.06);
      --shadow-lg: 0 24px 56px rgba(0,0,0,0.08);
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --max-width: 1120px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    /* Navigation */
    .nav {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0.85rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: -0.3px;
      cursor: pointer;
      color: var(--text);
      text-decoration: none;
    }

    .nav-brand .brand-dot {
      width: 7px; height: 7px;
      background: var(--primary);
      border-radius: 50%;
    }

    .nav-action {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.5rem 1.25rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .nav-action:hover {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
    }

    /* Main */
    .main-container {
      flex: 1;
      max-width: var(--max-width);
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .page {
      display: none;
      animation: fadeSlide 0.3s ease;
    }

    .page.active { display: block; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Hero */
    .hero {
      text-align: center;
      margin-bottom: 3rem;
    }

    .hero h1 {
      font-size: clamp(1.9rem, 4.5vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.8px;
      line-height: 1.15;
      margin-bottom: 0.6rem;
    }

    .hero .gradient-text {
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      max-width: 520px;
      margin: 0 auto;
    }

    /* Section */
    .section-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1.25rem;
    }

    /* Grille services */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .service-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow-xs);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      cursor: pointer;
      position: relative;
    }

    .service-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: #d4d0fa;
    }

    .service-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius-sm);
      background: var(--primary-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .service-card h3 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .service-card p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      line-height: 1.45;
      flex: 1;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.7rem 1.4rem;
      border-radius: 2.5rem;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      letter-spacing: -0.2px;
      white-space: nowrap;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 14px rgba(79,70,229,0.22);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
      box-shadow: 0 8px 22px rgba(79,70,229,0.32);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-outline {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-outline:hover { background: #f1f5f9; }

    .btn-ghost {
      background: transparent;
      color: var(--primary);
      padding: 0.45rem 0.9rem;
      font-size: 0.84rem;
    }

    .btn-ghost:hover { background: var(--primary-light); }

    .btn-full { width: 100%; }
    .btn-small { padding: 0.5rem 1rem; font-size: 0.8rem; }

    /* Page service */
    .service-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .back-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: var(--transition);
      flex-shrink: 0;
      color: var(--text);
    }

    .back-btn:hover { background: #f1f5f9; }

    .service-page-title {
      font-size: 1.35rem;
      font-weight: 700;
    }

    /* Formulaire */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2rem;
      box-shadow: var(--shadow-sm);
      max-width: 620px;
    }

    .form-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .form-group label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    .form-group input,
    .form-group textarea {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      font-size: 0.93rem;
      font-family: inherit;
      transition: var(--transition);
      outline: none;
      width: 100%;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.08);
    }

    .form-group input.input-error,
    .form-group textarea.input-error {
      border-color: var(--error);
      background: var(--error-bg);
    }

    textarea { resize: vertical; min-height: 85px; }

    .style-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 0.25rem 0;
    }

    .style-label {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text);
    }

    .radio-group {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-weight: 500;
      font-size: 0.88rem;
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
    }

    .form-error {
      color: var(--error);
      font-size: 0.84rem;
      font-weight: 500;
      display: none;
      margin-top: 0.25rem;
    }

    .form-error.visible { display: block; }

    /* Loader */
    .loader-inline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 2.5rem;
      color: var(--primary);
      font-weight: 500;
    }

    .spinner {
      width: 22px; height: 22px;
      border: 2.5px solid #e2e8f0;
      border-top: 2.5px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Résultat */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 1.75rem;
      box-shadow: var(--shadow-sm);
      margin-top: 1.75rem;
      display: none;
      animation: fadeSlide 0.35s ease;
      max-width: 620px;
    }

    .result-card.visible { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .result-badge {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 700;
      font-size: 0.78rem;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .result-body {
      background: #f8fafc;
      border: 1px solid #f1f5f9;
      border-radius: var(--radius);
      padding: 1.25rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.93rem;
      max-height: 380px;
      overflow-y: auto;
    }

    .result-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    /* Suggestions */
    .suggestions {
      margin-top: 2rem;
      max-width: 620px;
    }

    .suggestions p {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.88rem;
      margin-bottom: 0.75rem;
    }

    .suggestions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    /* Pied de page */
    .footer-note {
      text-align: center;
      color: #94a3b8;
      font-size: 0.78rem;
      margin-top: 3rem;
      padding-bottom: 1rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav { padding: 0.7rem 1rem; }
      .main-container { padding: 1.5rem 1rem 3rem; }
      .form-row { grid-template-columns: 1fr; }
      .form-card, .result-card { padding: 1.25rem; }
      .service-header { margin-bottom: 1.25rem; }
    }

    @media (max-width: 480px) {
      .services-grid { grid-template-columns: 1fr; }
      .hero h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" id="brandLink">ai.econcours.ma<span class="brand-dot"></span></a>
    <button class="nav-action" id="navHomeBtn">Accueil</button>
  </nav>

  <main class="main-container">
    <!-- ========== PAGE ACCUEIL ========== -->
    <div class="page active" id="pageHome">
      <div class="hero">
        <h1>Votre <span class="gradient-text">carrière</span> propulsée par l'IA</h1>
        <p>Créez des candidatures parfaites et préparez vos entretiens avec un assistant intelligent.</p>
      </div>

      <div class="section-title">Services</div>
      <div class="services-grid" id="servicesGrid"></div>
      <div class="footer-note">Propulsé par Groq · Intelligence artificielle</div>
    </div>

    <!-- ========== PAGE SERVICE ========== -->
    <div class="page" id="pageService">
      <div class="service-header">
        <button class="back-btn" id="backBtn">←</button>
        <h2 class="service-page-title" id="serviceTitle">Service</h2>
      </div>
      <div id="serviceContent"></div>
    </div>
  </main>

  <script>
    (function() {
      const GROQ_API_KEY = "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";
      const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
      const MODEL = "llama-3.3-70b-versatile";

      // Services (icônes uniques, pas de doublons)
      const SERVICES = [
        { id: 'email',       title: 'Email de candidature',    desc: 'Rédigez un email professionnel percutant pour contacter un recruteur.',               icon: '📧' },
        { id: 'lettre',      title: 'Lettre de motivation',    desc: 'Créez une lettre de motivation complète, structurée et convaincante.',                  icon: '📄' },
        { id: 'resume',      title: 'Résumé professionnel',    desc: 'Générez un profil CV percutant qui met en valeur votre parcours et vos atouts.',        icon: '👤' },
        { id: 'skills',      title: 'Améliorer compétences',   desc: 'Optimisez la présentation de vos compétences pour un CV moderne et impactant.',          icon: '⚡' },
        { id: 'interview',   title: 'Simulation d\'entretien', desc: 'L\'IA vous pose des questions de recruteur et évalue vos réponses en temps réel.',      icon: '🎤' },
        { id: 'answers',     title: 'Réponses d\'entretien',   desc: 'Obtenez des réponses parfaites aux questions les plus fréquentes en entretien.',        icon: '💡' },
        { id: 'linkedin',    title: 'Bio LinkedIn',            desc: 'Rédigez une biographie professionnelle optimisée pour votre profil LinkedIn.',           icon: '🔗' },
        { id: 'headline',    title: 'Titre professionnel',     desc: 'Créez un titre accrocheur qui attire l\'attention des recruteurs sur LinkedIn et CV.',   icon: '✨' },
        { id: 'objective',   title: 'Objectif de carrière',    desc: 'Définissez un objectif professionnel clair et motivant pour votre projet.',              icon: '🎯' },
        { id: 'rewrite',     title: 'Corriger et réécrire',    desc: 'Améliorez un texte existant : correction, reformulation et optimisation du style.',      icon: '✍️' },
      ];

      let currentService = null;

      // DOM
      const pageHome = document.getElementById('pageHome');
      const pageService = document.getElementById('pageService');
      const serviceTitle = document.getElementById('serviceTitle');
      const serviceContent = document.getElementById('serviceContent');
      const servicesGrid = document.getElementById('servicesGrid');

      // Navigation
      function showHome() {
        pageHome.classList.add('active');
        pageService.classList.remove('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function showService(serviceId) {
        const service = SERVICES.find(s => s.id === serviceId);
        if (!service) return;
        currentService = service;
        serviceTitle.textContent = `${service.icon} ${service.title}`;
        pageHome.classList.remove('active');
        pageService.classList.add('active');
        renderServicePage(service);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      // Rendu grille accueil
      function renderHomeServices() {
        servicesGrid.innerHTML = SERVICES.map(svc => `
          <div class="service-card" data-service="${svc.id}">
            <div class="service-icon">${svc.icon}</div>
            <h3>${svc.title}</h3>
            <p>${svc.desc}</p>
            <button class="btn btn-primary btn-small" data-service="${svc.id}">Commencer</button>
          </div>
        `).join('');

        servicesGrid.querySelectorAll('[data-service]').forEach(el => {
          el.addEventListener('click', (e) => {
            const id = el.dataset.service;
            if (id) showService(id);
          });
        });
      }

      // API
      async function callGroq(systemPrompt, userPrompt) {
        const resp = await fetch(GROQ_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${GROQ_API_KEY}`
          },
          body: JSON.stringify({
            model: MODEL,
            messages: [
              { role: "system", content: systemPrompt },
              { role: "user", content: userPrompt }
            ],
            temperature: 0.9,
            max_tokens: 800,
          })
        });
        if (!resp.ok) throw new Error(`API ${resp.status}`);
        const data = await resp.json();
        return data.choices[0].message.content.trim();
      }

      // Rendu page service
      function renderServicePage(service) {
        if (service.id === 'interview') {
          renderInterview();
        } else if (service.id === 'rewrite') {
          renderRewrite();
        } else if (service.id === 'answers') {
          renderAnswers();
        } else {
          renderStandardForm(service);
        }
      }

      // Formulaire standard
      function renderStandardForm(service) {
        serviceContent.innerHTML = `
          <div class="form-card">
            <div class="form-grid">
              <div class="form-row">
                <div class="form-group">
                  <label>Nom complet</label>
                  <input type="text" id="fName" placeholder="Votre nom complet">
                </div>
                <div class="form-group">
                  <label>Ville</label>
                  <input type="text" id="fCity" placeholder="Votre ville">
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Diplôme</label>
                  <input type="text" id="fDegree" placeholder="Votre diplôme (optionnel)">
                </div>
                <div class="form-group">
                  <label>Poste visé</label>
                  <input type="text" id="fJob" placeholder="Poste recherché">
                </div>
              </div>
              <div class="form-group">
                <label>Compétences</label>
                <textarea id="fSkills" rows="2" placeholder="Vos compétences (séparées par des virgules)"></textarea>
              </div>
            </div>
            <div class="style-row">
              <span class="style-label">Style :</span>
              <div class="radio-group">
                <label><input type="radio" name="styleOpt" value="Formel" checked> Formel</label>
                <label><input type="radio" name="styleOpt" value="Normal"> Normal</label>
                <label><input type="radio" name="styleOpt" value="Très professionnel"> Très pro</label>
              </div>
            </div>
            <div class="form-error" id="formError">Veuillez remplir tous les champs obligatoires.</div>
            <button class="btn btn-primary btn-full" id="genBtn" style="margin-top:1rem;" disabled>Générer</button>
          </div>
          <div id="loaderBox" class="loader-inline" style="display:none;"><div class="spinner"></div> Génération en cours...</div>
          <div class="result-card" id="resultCard">
            <div class="result-header"><span class="result-badge" id="resultBadge">Résultat</span></div>
            <div class="result-body" id="resultBody"></div>
            <div class="result-actions">
              <button class="btn btn-outline" id="copyBtn">Copier</button>
              <button class="btn btn-ghost" id="regenBtn">Regénérer</button>
            </div>
          </div>
          <div class="suggestions" id="suggestBox" style="display:none;">
            <p>Continuer avec un autre service :</p>
            <div class="suggestions-row" id="suggestRow"></div>
          </div>
        `;

        const fName = document.getElementById('fName');
        const fCity = document.getElementById('fCity');
        const fJob = document.getElementById('fJob');
        const fSkills = document.getElementById('fSkills');
        const genBtn = document.getElementById('genBtn');
        const formError = document.getElementById('formError');
        const loaderBox = document.getElementById('loaderBox');
        const resultCard = document.getElementById('resultCard');
        const resultBody = document.getElementById('resultBody');
        const resultBadge = document.getElementById('resultBadge');
        const suggestBox = document.getElementById('suggestBox');
        const suggestRow = document.getElementById('suggestRow');
        let lastContent = '';

        function checkForm() {
          const ok = fName.value.trim() && fCity.value.trim() && fJob.value.trim() && fSkills.value.trim();
          genBtn.disabled = !ok;
          if (ok) formError.classList.remove('visible');
        }

        [fName, fCity, fJob, fSkills].forEach(el => el.addEventListener('input', checkForm));

        genBtn.addEventListener('click', async () => {
          if (!fName.value.trim() || !fCity.value.trim() || !fJob.value.trim() || !fSkills.value.trim()) {
            formError.classList.add('visible');
            return;
          }
          formError.classList.remove('visible');
          loaderBox.style.display = 'flex';
          resultCard.classList.remove('visible');
          suggestBox.style.display = 'none';

          const style = document.querySelector('input[name="styleOpt"]:checked')?.value || 'Formel';
          const user = {
            name: fName.value.trim(), city: fCity.value.trim(),
            degree: fDegree.value.trim() || 'Non spécifié',
            job: fJob.value.trim(), skills: fSkills.value.trim(), style
          };

          const prompts = {
            email: `Rédige un email de candidature professionnel. Candidat: ${user.name}, compétences: ${user.skills}, diplôme: ${user.degree}, ville: ${user.city}, poste: ${user.job}. Style: ${user.style}.`,
            lettre: `Rédige une lettre de motivation complète. Candidat: ${user.name}, compétences: ${user.skills}, diplôme: ${user.degree}, ville: ${user.city}, poste: ${user.job}. Style: ${user.style}.`,
            resume: `Rédige un résumé professionnel CV (3-4 lignes). ${user.name}, compétences: ${user.skills}, poste: ${user.job}.`,
            skills: `Optimise ces compétences pour CV: "${user.skills}". Regroupe par catégories.`,
            linkedin: `Rédige une bio LinkedIn professionnelle. ${user.name}, compétences: ${user.skills}, poste: ${user.job}. Style: ${user.style}.`,
            headline: `Crée un titre professionnel accrocheur. ${user.name}, poste: ${user.job}, compétences: ${user.skills}.`,
            objective: `Rédige un objectif de carrière. ${user.name}, poste: ${user.job}, compétences: ${user.skills}.`,
          };

          try {
            const content = await callGroq("Expert recrutement. Réponds uniquement en français.", prompts[service.id] || `Génère: ${service.title}. Candidat: ${user.name}.`);
            lastContent = content;
            resultBadge.textContent = service.title;
            resultBody.textContent = content;
            resultCard.classList.add('visible');
            showSuggestions(service.id, suggestRow, suggestBox);
          } catch {
            resultBody.textContent = "Erreur de génération. Vérifiez la clé API.";
            resultCard.classList.add('visible');
          } finally {
            loaderBox.style.display = 'none';
          }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
          if (lastContent) navigator.clipboard.writeText(lastContent).then(() => alert('Copié !'));
        });
        document.getElementById('regenBtn').addEventListener('click', () => genBtn.click());
      }

      // Réécriture
      function renderRewrite() {
        serviceContent.innerHTML = `
          <div class="form-card">
            <div class="form-group">
              <label>Texte à améliorer</label>
              <textarea id="rwInput" rows="5" placeholder="Collez votre texte ici..."></textarea>
            </div>
            <div class="style-row">
              <span class="style-label">Style :</span>
              <div class="radio-group">
                <label><input type="radio" name="rwStyle" value="Formel" checked> Formel</label>
                <label><input type="radio" name="rwStyle" value="Normal"> Normal</label>
                <label><input type="radio" name="rwStyle" value="Très professionnel"> Très pro</label>
              </div>
            </div>
            <div class="form-error" id="rwError">Veuillez entrer un texte.</div>
            <button class="btn btn-primary btn-full" id="rwBtn" style="margin-top:1rem;" disabled>Améliorer le texte</button>
          </div>
          <div id="rwLoader" class="loader-inline" style="display:none;"><div class="spinner"></div> Amélioration...</div>
          <div class="result-card" id="rwResult">
            <div class="result-header"><span class="result-badge">Texte amélioré</span></div>
            <div class="result-body" id="rwBody"></div>
            <div class="result-actions">
              <button class="btn btn-outline" id="rwCopy">Copier</button>
              <button class="btn btn-ghost" id="rwRegen">Regénérer</button>
            </div>
          </div>
        `;

        const input = document.getElementById('rwInput');
        const btn = document.getElementById('rwBtn');
        const error = document.getElementById('rwError');
        const loader = document.getElementById('rwLoader');
        const result = document.getElementById('rwResult');
        const body = document.getElementById('rwBody');
        let txt = '';

        input.addEventListener('input', () => { btn.disabled = !input.value.trim(); if(input.value.trim()) error.classList.remove('visible'); });
        btn.addEventListener('click', async () => {
          if(!input.value.trim()){error.classList.add('visible');return;}
          error.classList.remove('visible'); loader.style.display='flex'; result.classList.remove('visible');
          const style = document.querySelector('input[name="rwStyle"]:checked')?.value || 'Formel';
          try {
            txt = await callGroq("Expert rédaction. Réponds uniquement en français.", `Corrige et améliore ce texte. Style: ${style}. Texte: "${input.value.trim()}"`);
            body.textContent = txt; result.classList.add('visible');
          } catch { body.textContent='Erreur.'; result.classList.add('visible'); }
          finally { loader.style.display='none'; }
        });
        document.getElementById('rwCopy').addEventListener('click', () => { if(txt) navigator.clipboard.writeText(txt).then(()=>alert('Copié !')); });
        document.getElementById('rwRegen').addEventListener('click', () => btn.click());
      }

      // Réponses entretien
      function renderAnswers() {
        serviceContent.innerHTML = `
          <div class="form-card">
            <div class="form-group"><label>Question d'entretien</label><input type="text" id="qInput" placeholder="Ex: Pourquoi vous et pas un autre ?"></div>
            <div class="form-group"><label>Contexte (optionnel)</label><textarea id="ctxInput" rows="2" placeholder="Poste, entreprise, vos atouts..."></textarea></div>
            <div class="form-error" id="qError">Veuillez entrer une question.</div>
            <button class="btn btn-primary btn-full" id="qBtn" style="margin-top:1rem;" disabled>Générer une réponse</button>
          </div>
          <div id="qLoader" class="loader-inline" style="display:none;"><div class="spinner"></div> Génération...</div>
          <div class="result-card" id="qResult">
            <div class="result-header"><span class="result-badge">Réponse suggérée</span></div>
            <div class="result-body" id="qBody"></div>
            <div class="result-actions"><button class="btn btn-outline" id="qCopy">Copier</button><button class="btn btn-ghost" id="qRegen">Autre réponse</button></div>
          </div>
        `;
        const qInput = document.getElementById('qInput'), ctxInput = document.getElementById('ctxInput'), btn = document.getElementById('qBtn'), error = document.getElementById('qError');
        const loader = document.getElementById('qLoader'), result = document.getElementById('qResult'), body = document.getElementById('qBody');
        let txt = '';
        qInput.addEventListener('input', () => { btn.disabled = !qInput.value.trim(); if(qInput.value.trim()) error.classList.remove('visible'); });
        btn.addEventListener('click', async () => {
          if(!qInput.value.trim()){error.classList.add('visible');return;}
          error.classList.remove('visible'); loader.style.display='flex'; result.classList.remove('visible');
          try {
            txt = await callGroq("Coach entretien. Réponds uniquement en français.", `Question: "${qInput.value.trim()}". Contexte: "${ctxInput.value.trim()||'Non spécifié'}". Rédige une réponse professionnelle.`);
            body.textContent = txt; result.classList.add('visible');
          } catch { body.textContent='Erreur.'; result.classList.add('visible'); }
          finally { loader.style.display='none'; }
        });
        document.getElementById('qCopy').addEventListener('click', () => { if(txt) navigator.clipboard.writeText(txt).then(()=>alert('Copié !')); });
        document.getElementById('qRegen').addEventListener('click', () => btn.click());
      }

      // Interview
      function renderInterview() {
        serviceContent.innerHTML = `
          <div class="form-card">
            <div class="form-row">
              <div class="form-group"><label>Poste visé</label><input type="text" id="ivJob" placeholder="Poste pour l'entretien"></div>
              <div class="form-group"><label>Entreprise (optionnel)</label><input type="text" id="ivCompany" placeholder="Nom de l'entreprise"></div>
            </div>
            <div class="form-error" id="ivError">Veuillez indiquer le poste.</div>
            <button class="btn btn-primary btn-full" id="ivStart" style="margin-top:1rem;" disabled>Démarrer la simulation</button>
          </div>
          <div class="result-card" id="ivCard" style="display:none;">
            <div class="result-header"><span class="result-badge">Simulation d'entretien</span></div>
            <div id="ivChat" style="display:flex;flex-direction:column;gap:0.75rem;max-height:350px;overflow-y:auto;margin-bottom:1rem;"></div>
            <div id="ivInputRow" style="display:flex;gap:0.5rem;"><input type="text" id="ivAnswer" placeholder="Votre réponse..." style="flex:1;"><button class="btn btn-primary" id="ivSend">Envoyer</button></div>
            <div id="ivScore" style="display:none;background:var(--primary-light);padding:1rem;border-radius:1rem;text-align:center;font-weight:600;margin-top:1rem;"></div>
            <button class="btn btn-outline btn-full" id="ivRestart" style="display:none;margin-top:0.75rem;">Recommencer</button>
          </div>
        `;
        const jobInp = document.getElementById('ivJob'), compInp = document.getElementById('ivCompany'), startBtn = document.getElementById('ivStart'), err = document.getElementById('ivError');
        const card = document.getElementById('ivCard'), chat = document.getElementById('ivChat'), inputRow = document.getElementById('ivInputRow');
        const answerInp = document.getElementById('ivAnswer'), sendBtn = document.getElementById('ivSend'), scoreDiv = document.getElementById('ivScore'), restartBtn = document.getElementById('ivRestart');
        let questions = [], answers = [], idx = 0;
        const TOTAL = 4;

        jobInp.addEventListener('input', () => { startBtn.disabled = !jobInp.value.trim(); if(jobInp.value.trim()) err.classList.remove('visible'); });
        startBtn.addEventListener('click', async () => {
          if(!jobInp.value.trim()){err.classList.add('visible');return;}
          err.classList.remove('visible'); card.style.display='block'; chat.innerHTML='<div class="loader-inline"><div class="spinner"></div> Préparation...</div>';
          inputRow.style.display='none'; scoreDiv.style.display='none'; restartBtn.style.display='none'; answers=[]; idx=0;
          try {
            const qs = await callGroq("Recruteur. Réponds uniquement en français.", `Génère ${TOTAL} questions d'entretien pour ${jobInp.value.trim()} chez ${compInp.value.trim()||'une entreprise'}. Numérote-les.`);
            questions = qs.split('\n').filter(l=>l.trim()&&/\d/.test(l)).map(l=>l.replace(/^\d+[\.\)]\s*/,'')).slice(0,TOTAL);
            if(questions.length<2) questions = ["Parlez-moi de vous.","Pourquoi ce poste ?","Vos qualités ?","Votre plus grand défi ?"];
            chat.innerHTML='';
            bubble('ai',`Bonjour ! Simulation pour <strong>${jobInp.value.trim()}</strong>. ${questions.length} questions.`);
            setTimeout(()=>{ bubble('ai',`1/${questions.length} : ${questions[0]}`); inputRow.style.display='flex'; answerInp.focus(); },700);
          } catch { chat.innerHTML='<p>Erreur génération questions.</p>'; }
        });

        sendBtn.addEventListener('click', async () => {
          const ans = answerInp.value.trim(); if(!ans) return;
          bubble('user', ans); answers.push({q:questions[idx], a:ans}); answerInp.value=''; idx++;
          if(idx < questions.length) { bubble('ai', `${idx+1}/${questions.length} : ${questions[idx]}`); }
          else {
            inputRow.style.display='none'; bubble('ai','Évaluation en cours...');
            try {
              const fb = await callGroq("Coach. Réponds uniquement en français.", `Évalue ces réponses d'entretien. Score/10 et feedback. ${JSON.stringify(answers)}`);
              scoreDiv.innerHTML = `📊 ${fb}`; scoreDiv.style.display='block';
            } catch { scoreDiv.innerHTML='Évaluation indisponible.'; scoreDiv.style.display='block'; }
            restartBtn.style.display='block';
          }
          chat.scrollTop = chat.scrollHeight;
        });
        answerInp.addEventListener('keypress', e => { if(e.key==='Enter') sendBtn.click(); });
        restartBtn.addEventListener('click', ()=>{ card.style.display='none'; startBtn.click(); });

        function bubble(type, text) {
          const d = document.createElement('div');
          d.style.cssText = `padding:0.7rem 1rem;border-radius:1rem;max-width:82%;line-height:1.5;font-size:0.9rem;`;
          d.style.background = type==='ai' ? 'var(--primary-light)' : '#e2e8f0';
          d.style.alignSelf = type==='ai' ? 'flex-start' : 'flex-end';
          d.innerHTML = text; chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
        }
      }

      function showSuggestions(excludeId, row, box) {
        const others = SERVICES.filter(s => s.id !== excludeId).slice(0, 4);
        row.innerHTML = others.map(s => `<button class="btn btn-outline btn-small sug-btn" data-sid="${s.id}">${s.icon} ${s.title}</button>`).join('');
        box.style.display = 'block';
        row.querySelectorAll('.sug-btn').forEach(b => b.addEventListener('click', () => showService(b.dataset.sid)));
      }

      // Events
      document.getElementById('brandLink').addEventListener('click', e => { e.preventDefault(); showHome(); });
      document.getElementById('navHomeBtn').addEventListener('click', showHome);
      document.getElementById('backBtn').addEventListener('click', showHome);
      renderHomeServices();
    })();
  </script>
</body>
</html>
