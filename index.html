<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>career.econcours.ma — Accélérez votre carrière</title>
  <style>
    :root {
      --bg: #fbfbfa;
      --surface: #ffffff;
      --border: #e8e6e3;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-muted: #9a9a9a;
      --primary: #0f0f0f;
      --primary-hover: #1f1f1f;
      --accent: #d4a853;
      --accent-hover: #c49640;
      --accent-light: #fef9f0;
      --success: #1a7f4b;
      --error: #cc3333;
      --radius-sm: 6px;
      --radius: 10px;
      --radius-lg: 14px;
      --radius-xl: 18px;
      --shadow-xs: 0 1px 2px rgba(0,0,0,0.03);
      --shadow-sm: 0 2px 6px rgba(0,0,0,0.04);
      --shadow-md: 0 6px 20px rgba(0,0,0,0.06);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.08);
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --max-width: 1100px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
    }

    /* Navigation */
    .nav {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: -0.3px;
      color: var(--primary);
      cursor: pointer;
      text-decoration: none;
    }

    .nav-brand span {
      color: var(--accent);
    }

    .nav-btn {
      font-size: 0.84rem;
      font-weight: 600;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 0.55rem 1.4rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .nav-btn:hover {
      background: var(--primary-hover);
      box-shadow: var(--shadow-md);
    }

    /* Main */
    .main-container {
      flex: 1;
      max-width: var(--max-width);
      width: 100%;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    .page {
      display: none;
      animation: fadeSlide 0.45s ease;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== HOMEPAGE ========== */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 70vh;
      padding: 2rem 1rem;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.6px;
      line-height: 1.2;
      margin-bottom: 1.2rem;
      color: var(--primary);
    }

    .hero h1 .accent {
      color: var(--accent);
    }

    .hero p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      max-width: 520px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 0.9rem 2.4rem;
      border-radius: 2.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: -0.2px;
      box-shadow: 0 6px 22px rgba(15,15,15,0.2);
    }

    .hero-cta:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(15,15,15,0.28);
    }

    /* ========== SERVICES PAGE ========== */
    .services-header {
      text-align: center;
      padding: 3rem 1rem 2rem;
    }

    .services-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .services-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .service-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow-xs);
      transition: var(--transition);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .service-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: #d8d5ce;
    }

    .service-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      background: #f5f4f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .service-card h3 {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .service-card p {
      color: var(--text-muted);
      font-size: 0.82rem;
      line-height: 1.45;
      flex: 1;
    }

    .service-card .svc-arrow {
      align-self: flex-end;
      color: var(--text-muted);
      transition: var(--transition);
    }

    .service-card:hover .svc-arrow {
      color: var(--primary);
      transform: translateX(3px);
    }

    .back-row {
      text-align: center;
      margin-top: 1.5rem;
    }

    /* ========== SERVICE DETAIL PAGE ========== */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-top: 1.5rem;
    }

    .back-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: var(--transition);
      flex-shrink: 0;
      color: var(--text);
    }

    .back-btn:hover {
      background: #f5f4f0;
    }

    .detail-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--primary);
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2rem;
      box-shadow: var(--shadow-sm);
      max-width: 620px;
    }

    .form-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .form-group label {
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    .form-group input,
    .form-group textarea {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.7rem 0.9rem;
      font-size: 0.9rem;
      font-family: inherit;
      transition: var(--transition);
      outline: none;
      width: 100%;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15,15,15,0.05);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-error {
      color: var(--error);
      font-size: 0.82rem;
      font-weight: 500;
      display: none;
    }

    .form-error.visible {
      display: block;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.7rem 1.6rem;
      border-radius: 2.5rem;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      letter-spacing: -0.2px;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 12px rgba(15,15,15,0.18);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
      box-shadow: 0 8px 20px rgba(15,15,15,0.26);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-outline {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      background: #f5f4f0;
    }

    .btn-ghost {
      background: transparent;
      color: var(--primary);
      padding: 0.4rem 0.8rem;
      font-size: 0.82rem;
    }

    .btn-ghost:hover {
      background: #f5f4f0;
    }

    .btn-full {
      width: 100%;
    }

    .btn-accent {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 14px rgba(212,168,83,0.3);
    }

    .btn-accent:hover {
      background: var(--accent-hover);
      box-shadow: 0 8px 22px rgba(212,168,83,0.4);
    }

    /* Loader */
    .loader-box {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      padding: 2.5rem;
      color: var(--primary);
      font-weight: 500;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid #e0ded8;
      border-top: 2.5px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Result */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 1.75rem;
      box-shadow: var(--shadow-sm);
      margin-top: 1.75rem;
      display: none;
      animation: fadeSlide 0.35s ease;
      max-width: 620px;
    }

    .result-card.visible {
      display: block;
    }

    .result-badge {
      background: #f5f4f0;
      color: var(--primary);
      font-weight: 700;
      font-size: 0.76rem;
      padding: 0.3rem 0.9rem;
      border-radius: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      display: inline-block;
      margin-bottom: 1rem;
    }

    .result-body {
      background: #fafaf8;
      border: 1px solid #f0efeb;
      border-radius: var(--radius);
      padding: 1.25rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.9rem;
      max-height: 400px;
      overflow-y: auto;
    }

    .result-actions {
      display: flex;
      gap: 0.7rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }

    /* Upgrade card */
    .upgrade-card {
      background: var(--accent-light);
      border: 1px solid #e8dcc4;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-top: 1.5rem;
      max-width: 620px;
      text-align: center;
    }

    .upgrade-card h4 {
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--primary);
    }

    .upgrade-card p {
      color: var(--text-secondary);
      font-size: 0.88rem;
      margin-bottom: 1rem;
    }

    .price {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
    }

    .price span {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 2rem 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: auto;
    }

    @media (max-width: 900px) {
      .services-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 600px) {
      .services-grid {
        grid-template-columns: 1fr;
      }
      .form-row {
        grid-template-columns: 1fr;
      }
      .form-card,
      .result-card {
        padding: 1.25rem;
      }
      .nav {
        padding: 0.8rem 1rem;
      }
      .hero {
        min-height: 60vh;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" id="brandLink">career<span>.</span>econcours<span>.</span>ma</a>
    <button class="nav-btn" id="navCta">Accéder aux services</button>
  </nav>

  <main class="main-container">
    <!-- ========== PAGE ACCUEIL ========== -->
    <div class="page active" id="pageHome">
      <div class="hero">
        <h1>Votre <span class="accent">carrière</span> mérite une stratégie professionnelle</h1>
        <p>Des services de candidature haut de gamme pour vous démarquer sur le marché du travail.</p>
        <button class="hero-cta" id="heroCta">Découvrir nos services →</button>
      </div>
    </div>

    <!-- ========== PAGE SERVICES ========== -->
    <div class="page" id="pageServices">
      <div class="services-header">
        <h2>Nos services</h2>
        <p>Choisissez le service adapté à votre objectif professionnel.</p>
      </div>
      <div class="services-grid" id="servicesGrid"></div>
      <div class="back-row">
        <button class="btn btn-outline" id="backToHomeFromServices">← Retour à l'accueil</button>
      </div>
    </div>

    <!-- ========== PAGE DÉTAIL SERVICE ========== -->
    <div class="page" id="pageDetail">
      <div class="detail-header">
        <button class="back-btn" id="backToServicesBtn">←</button>
        <h2 class="detail-title" id="detailTitle">Service</h2>
      </div>
      <div id="detailContent"></div>
    </div>
  </main>

  <footer class="footer">
    © 2025 career.econcours.ma — Tous droits réservés.
  </footer>

  <script>
    (function() {
      const GROQ_API_KEY = "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";
      const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
      const MODEL = "llama-3.3-70b-versatile";
      const WHATSAPP = "212644455893";

      const SERVICES = [
        { id: 'cv', title: 'CV professionnel optimisé', desc: 'Un curriculum vitae structuré et percutant, adapté aux standards actuels du recrutement.', icon: '📋' },
        { id: 'lettre', title: 'Lettre de motivation', desc: 'Une lettre personnalisée qui met en valeur votre parcours et votre valeur ajoutée.', icon: '📝' },
        { id: 'email', title: 'Email de candidature', desc: 'Un message professionnel complet pour accompagner votre dossier de candidature.', icon: '📧' },
        { id: 'interview', title: 'Simulation d\'entretien', desc: 'Un consultant vous pose des questions de recruteur et évalue vos réponses en détail.', icon: '🎤' },
        { id: 'analyse', title: 'Analyse et amélioration de CV', desc: 'Diagnostic complet de votre CV existant avec recommandations ciblées.', icon: '🔍' },
        { id: 'linkedin', title: 'Profil LinkedIn professionnel', desc: 'Optimisation complète de votre profil pour attirer les recruteurs.', icon: '🔗' },
        { id: 'objectif', title: 'Objectif de carrière', desc: 'Définition claire et stratégique de votre projet professionnel.', icon: '🎯' },
      ];

      let currentService = null;

      const pageHome = document.getElementById('pageHome');
      const pageServices = document.getElementById('pageServices');
      const pageDetail = document.getElementById('pageDetail');
      const servicesGrid = document.getElementById('servicesGrid');
      const detailTitle = document.getElementById('detailTitle');
      const detailContent = document.getElementById('detailContent');

      function showHome() {
        pageHome.classList.add('active');
        pageServices.classList.remove('active');
        pageDetail.classList.remove('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function showServices() {
        pageHome.classList.remove('active');
        pageServices.classList.add('active');
        pageDetail.classList.remove('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function showDetail(serviceId) {
        const svc = SERVICES.find(s => s.id === serviceId);
        if (!svc) return;
        currentService = svc;
        detailTitle.textContent = `${svc.icon} ${svc.title}`;
        pageHome.classList.remove('active');
        pageServices.classList.remove('active');
        pageDetail.classList.add('active');
        renderDetail(svc);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function renderServicesGrid() {
        servicesGrid.innerHTML = SERVICES.map(svc => `
          <div class="service-card" data-service="${svc.id}">
            <div class="service-icon">${svc.icon}</div>
            <h3>${svc.title}</h3>
            <p>${svc.desc}</p>
            <span class="svc-arrow">→</span>
          </div>
        `).join('');

        servicesGrid.querySelectorAll('.service-card').forEach(card => {
          card.addEventListener('click', () => {
            const id = card.dataset.service;
            if (id) showDetail(id);
          });
        });
      }

      async function callGroq(sys, usr) {
        const r = await fetch(GROQ_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${GROQ_API_KEY}`
          },
          body: JSON.stringify({
            model: MODEL,
            messages: [
              { role: "system", content: sys },
              { role: "user", content: usr }
            ],
            temperature: 0.8,
            max_tokens: 900
          })
        });
        if (!r.ok) throw new Error(`API ${r.status}`);
        const d = await r.json();
        return d.choices[0].message.content.trim();
      }

      function buildWhatsAppLink(serviceTitle, userName) {
        const msg = `Bonjour, je souhaite activer l'abonnement 50 MAD/an pour le service career.econcours.ma. Voici mes informations: service: ${serviceTitle}, nom: ${userName}`;
        return `https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`;
      }

      function renderDetail(svc) {
        if (svc.id === 'interview') { renderInterview(); return; }

        detailContent.innerHTML = `
          <div class="form-card">
            <div class="form-grid">
              <div class="form-row">
                <div class="form-group"><label>Nom complet</label><input type="text" id="fName" placeholder="Votre nom complet"></div>
                <div class="form-group"><label>Ville</label><input type="text" id="fCity" placeholder="Votre ville"></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>Formation / Diplôme</label><input type="text" id="fDegree" placeholder="Votre plus haut diplôme"></div>
                <div class="form-group"><label>Poste visé</label><input type="text" id="fJob" placeholder="Poste recherché"></div>
              </div>
              <div class="form-group"><label>Compétences</label><textarea id="fSkills" rows="2" placeholder="Vos compétences principales (séparées par des virgules)"></textarea></div>
            </div>
            <div class="form-error" id="formError">Veuillez remplir tous les champs obligatoires.</div>
            <button class="btn btn-primary btn-full" id="genBtn" style="margin-top:1rem;" disabled>Générer le document</button>
          </div>
          <div id="loaderBox" class="loader-box" style="display:none;"><div class="spinner"></div> Préparation de votre document...</div>
          <div class="result-card" id="resultCard">
            <div class="result-badge" id="resultBadge">Document généré</div>
            <div class="result-body" id="resultBody"></div>
            <div class="result-actions">
              <button class="btn btn-outline" id="copyBtn">Copier</button>
              <button class="btn btn-ghost" id="regenBtn">Regénérer</button>
              <button class="btn btn-outline" id="exportPdf">PDF</button>
              <button class="btn btn-outline" id="exportDoc">Word</button>
            </div>
          </div>
          <div class="upgrade-card" id="upgradeCard" style="display:none;">
            <h4>🔓 Débloquez l'accès complet</h4>
            <p>Abonnement annuel pour un usage illimité de tous les services.</p>
            <div class="price">50 MAD <span>/ an</span></div>
            <button class="btn btn-accent btn-full" id="upgradeBtn" style="margin-top:0.8rem;">Activer l'abonnement via WhatsApp</button>
          </div>
        `;

        const fName = document.getElementById('fName'), fCity = document.getElementById('fCity'), fJob = document.getElementById('fJob'), fSkills = document.getElementById('fSkills');
        const genBtn = document.getElementById('genBtn'), formError = document.getElementById('formError');
        const loaderBox = document.getElementById('loaderBox'), resultCard = document.getElementById('resultCard'), resultBody = document.getElementById('resultBody'), resultBadge = document.getElementById('resultBadge');
        const upgradeCard = document.getElementById('upgradeCard');
        let lastContent = '';

        function check() {
          const ok = fName.value.trim() && fCity.value.trim() && fJob.value.trim() && fSkills.value.trim();
          genBtn.disabled = !ok;
          if (ok) formError.classList.remove('visible');
        }
        [fName, fCity, fJob, fSkills].forEach(e => e.addEventListener('input', check));

        genBtn.addEventListener('click', async () => {
          if (!fName.value.trim() || !fCity.value.trim() || !fJob.value.trim() || !fSkills.value.trim()) {
            formError.classList.add('visible');
            return;
          }
          formError.classList.remove('visible');
          loaderBox.style.display = 'flex';
          resultCard.classList.remove('visible');
          upgradeCard.style.display = 'none';

          const u = {
            name: fName.value.trim(),
            city: fCity.value.trim(),
            degree: document.getElementById('fDegree').value.trim() || 'Non spécifié',
            job: fJob.value.trim(),
            skills: fSkills.value.trim()
          };

          const prompts = {
            cv: `Rédige un CV professionnel complet et structuré. Candidat: ${u.name}, ville: ${u.city}, diplôme: ${u.degree}, poste visé: ${u.job}, compétences: ${u.skills}. Rédaction soignée, mise en page suggérée.`,
            lettre: `Rédige une lettre de motivation professionnelle de haute qualité. Candidat: ${u.name}, ville: ${u.city}, diplôme: ${u.degree}, poste: ${u.job}, compétences: ${u.skills}. Ton professionnel et convaincant.`,
            email: `Rédige un email de candidature professionnel avec objet et formule de politesse. ${u.name}, poste: ${u.job}, compétences: ${u.skills}.`,
            analyse: `Analyse ce profil de CV et donne des recommandations professionnelles détaillées. ${u.name}, compétences: ${u.skills}, poste: ${u.job}, diplôme: ${u.degree}.`,
            linkedin: `Rédige un profil LinkedIn professionnel complet. ${u.name}, poste: ${u.job}, compétences: ${u.skills}, ville: ${u.city}.`,
            objectif: `Rédige un objectif de carrière stratégique et professionnel. ${u.name}, poste visé: ${u.job}, compétences: ${u.skills}.`,
          };

          try {
            const content = await callGroq("Expert en recrutement et rédaction professionnelle. Réponds en français soigné.", prompts[svc.id]);
            lastContent = content;
            resultBadge.textContent = svc.title;
            resultBody.textContent = content;
            resultCard.classList.add('visible');
            upgradeCard.style.display = 'block';
            document.getElementById('upgradeBtn').addEventListener('click', () => {
              window.open(buildWhatsAppLink(svc.title, u.name), '_blank');
            });
          } catch {
            resultBody.textContent = "Une erreur est survenue. Veuillez réessayer.";
            resultCard.classList.add('visible');
          } finally {
            loaderBox.style.display = 'none';
          }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
          if (lastContent) navigator.clipboard.writeText(lastContent).then(() => alert('Document copié.'));
        });
        document.getElementById('regenBtn').addEventListener('click', () => genBtn.click());
        document.getElementById('exportPdf').addEventListener('click', () => {
          if (lastContent) {
            const blob = new Blob([lastContent], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${svc.id}_career_econcours.pdf`;
            a.click();
            URL.revokeObjectURL(url);
          }
        });
        document.getElementById('exportDoc').addEventListener('click', () => {
          if (lastContent) {
            const blob = new Blob([lastContent], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${svc.id}_career_econcours.doc`;
            a.click();
            URL.revokeObjectURL(url);
          }
        });
      }

      function renderInterview() {
        detailContent.innerHTML = `
          <div class="form-card">
            <div class="form-row">
              <div class="form-group"><label>Poste visé</label><input type="text" id="ivJob" placeholder="Poste pour l'entretien"></div>
              <div class="form-group"><label>Entreprise</label><input type="text" id="ivCompany" placeholder="Nom de l'entreprise (optionnel)"></div>
            </div>
            <div class="form-error" id="ivError">Veuillez indiquer le poste.</div>
            <button class="btn btn-primary btn-full" id="ivStart" style="margin-top:1rem;" disabled>Démarrer la simulation</button>
          </div>
          <div class="result-card" id="ivCard" style="display:none;">
            <div class="result-badge">Simulation d'entretien</div>
            <div id="ivChat" style="display:flex;flex-direction:column;gap:0.7rem;max-height:340px;overflow-y:auto;margin-bottom:1rem;"></div>
            <div id="ivInputRow" style="display:flex;gap:0.5rem;"><input type="text" id="ivAnswer" placeholder="Votre réponse..." style="flex:1;"><button class="btn btn-primary" id="ivSend">Envoyer</button></div>
            <div id="ivScore" style="display:none;background:#f5f4f0;padding:1rem;border-radius:var(--radius);text-align:center;font-weight:600;margin-top:1rem;"></div>
            <button class="btn btn-outline btn-full" id="ivRestart" style="display:none;margin-top:0.7rem;">Nouvelle simulation</button>
          </div>
          <div class="upgrade-card" id="ivUpgrade" style="display:none;">
            <h4>🔓 Débloquez l'accès complet</h4>
            <p>Abonnement annuel pour un usage illimité.</p>
            <div class="price">50 MAD <span>/ an</span></div>
            <button class="btn btn-accent btn-full" id="ivUpgradeBtn" style="margin-top:0.8rem;">Activer l'abonnement via WhatsApp</button>
          </div>
        `;

        const jobI = document.getElementById('ivJob'), compI = document.getElementById('ivCompany'), start = document.getElementById('ivStart'), err = document.getElementById('ivError');
        const card = document.getElementById('ivCard'), chat = document.getElementById('ivChat'), inpRow = document.getElementById('ivInputRow');
        const ansI = document.getElementById('ivAnswer'), send = document.getElementById('ivSend'), score = document.getElementById('ivScore'), restart = document.getElementById('ivRestart');
        const upgradeCard = document.getElementById('ivUpgrade');
        let qs = [], ans = [], idx = 0;
        const T = 4;

        jobI.addEventListener('input', () => { start.disabled = !jobI.value.trim(); if (jobI.value.trim()) err.classList.remove('visible'); });

        start.addEventListener('click', async () => {
          if (!jobI.value.trim()) { err.classList.add('visible'); return; }
          err.classList.remove('visible');
          card.style.display = 'block';
          upgradeCard.style.display = 'none';
          chat.innerHTML = '<div class="loader-box"><div class="spinner"></div> Préparation...</div>';
          inpRow.style.display = 'none';
          score.style.display = 'none';
          restart.style.display = 'none';
          ans = [];
          idx = 0;
          try {
            const qText = await callGroq("Recruteur professionnel. Réponds en français.", `Génère ${T} questions d'entretien pour ${jobI.value.trim()} chez ${compI.value.trim() || 'une entreprise'}.`);
            qs = qText.split('\n').filter(l => l.trim() && /\d/.test(l)).map(l => l.replace(/^\d+[\.\)]\s*/, '')).slice(0, T);
            if (qs.length < 2) qs = ["Parlez-moi de votre parcours.", "Pourquoi ce poste ?", "Quelles sont vos forces ?", "Comment gérez-vous la pression ?"];
            chat.innerHTML = '';
            bubble('consultant', `Bonjour. Simulation pour <strong>${jobI.value.trim()}</strong>.`);
            setTimeout(() => { bubble('consultant', `Question 1/${qs.length} : ${qs[0]}`); inpRow.style.display = 'flex'; ansI.focus(); }, 800);
          } catch { chat.innerHTML = '<p>Erreur.</p>'; }
        });

        send.addEventListener('click', async () => {
          const a = ansI.value.trim();
          if (!a) return;
          bubble('client', a);
          ans.push({ q: qs[idx], a });
          ansI.value = '';
          idx++;
          if (idx < qs.length) { bubble('consultant', `Question ${idx + 1}/${qs.length} : ${qs[idx]}`); } else {
            inpRow.style.display = 'none';
            bubble('consultant', 'Évaluation en cours...');
            try {
              const fb = await callGroq("Coach en entretien. Réponds en français.", `Évalue ces réponses sur 10 avec feedback : ${JSON.stringify(ans)}`);
              score.innerHTML = `📊 Résultat :<br><br>${fb}`;
              score.style.display = 'block';
            } catch { score.innerHTML = 'Évaluation indisponible.'; score.style.display = 'block'; }
            restart.style.display = 'block';
            upgradeCard.style.display = 'block';
            document.getElementById('ivUpgradeBtn').addEventListener('click', () => {
              window.open(buildWhatsAppLink('Simulation d\'entretien', jobI.value.trim()), '_blank');
            });
          }
          chat.scrollTop = chat.scrollHeight;
        });
        ansI.addEventListener('keypress', e => { if (e.key === 'Enter') send.click(); });
        restart.addEventListener('click', () => { card.style.display = 'none'; start.click(); });

        function bubble(type, text) {
          const d = document.createElement('div');
          d.style.cssText = `padding:0.65rem 1rem;border-radius:1rem;max-width:82%;line-height:1.5;font-size:0.88rem;`;
          d.style.background = type === 'consultant' ? '#f5f4f0' : '#e8e6e0';
          d.style.alignSelf = type === 'consultant' ? 'flex-start' : 'flex-end';
          d.innerHTML = text;
          chat.appendChild(d);
          chat.scrollTop = chat.scrollHeight;
        }
      }

      // Events
      document.getElementById('brandLink').addEventListener('click', e => { e.preventDefault(); showHome(); });
      document.getElementById('navCta').addEventListener('click', showServices);
      document.getElementById('heroCta').addEventListener('click', showServices);
      document.getElementById('backToHomeFromServices').addEventListener('click', showHome);
      document.getElementById('backToServicesBtn').addEventListener('click', showServices);

      renderServicesGrid();
    })();
  </script>
</body>
</html>
