<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>لوحة القيادة - econcours.ma</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Page */
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b1120 0%, #1a2634 100%);
            padding: 1rem;
        }

        .login-box {
            background: white;
            border-radius: 30px;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        .login-box .logo {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0f172a;
        }

        .login-box .logo span {
            color: #d97706;
        }

        .login-box .hadith {
            color: #d97706;
            font-size: 0.9rem;
            margin: 1rem 0;
            padding: 0.8rem;
            background: #fef3c7;
            border-radius: 15px;
        }

        .login-box input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 4px;
        }

        .login-box button {
            width: 100%;
            padding: 0.8rem;
            background: #d97706;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .error-message {
            color: #ef4444;
            margin-top: 1rem;
            display: none;
        }

        /* Dashboard */
        .dashboard-container {
            display: none;
            height: 100vh;
            overflow: hidden;
        }

        .dashboard-container.active {
            display: block;
        }

        /* Header */
        .main-header {
            background: white;
            padding: 0.6rem 1rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
        }

        .logo span {
            color: #d97706;
        }

        .admin-badge {
            background: #fef3c7;
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            color: #d97706;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            white-space: nowrap;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .date-badge {
            background: #f1f5f9;
            padding: 0.2rem 0.6rem;
            border-radius: 40px;
            color: #475569;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            white-space: nowrap;
        }

        .logout-btn {
            background: none;
            border: 1px solid #e2e8f0;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            color: #64748b;
            cursor: pointer;
            font-size: 0.7rem;
        }

        /* Main Content */
        .main-content {
            margin-top: 60px;
            height: calc(100vh - 60px);
            overflow-y: auto;
            padding: 0.8rem;
            -webkit-overflow-scrolling: touch;
        }

        /* KPI Cards - محسنة للهاتف */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
            margin-bottom: 0.8rem;
        }

        .kpi-card {
            background: white;
            border-radius: 16px;
            padding: 0.8rem;
            border: 1px solid #e2e8f0;
        }

        .kpi-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .kpi-icon {
            width: 36px;
            height: 36px;
            background: #fef3c7;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d97706;
            font-size: 1rem;
        }

        .kpi-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0f172a;
        }

        .kpi-label {
            color: #64748b;
            font-size: 0.7rem;
        }

        .kpi-trend {
            font-size: 0.65rem;
            color: #10b981;
            background: #d1fae5;
            padding: 0.1rem 0.3rem;
            border-radius: 20px;
            display: inline-block;
        }

        /* Stats Grid - محسنة للهاتف */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.6rem;
            margin-bottom: 0.8rem;
        }

        .stat-card {
            background: white;
            border-radius: 14px;
            padding: 0.8rem;
            border: 1px solid #e2e8f0;
        }

        .stat-title {
            color: #64748b;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            margin-bottom: 0.3rem;
        }

        .stat-title i {
            color: #d97706;
            font-size: 0.7rem;
        }

        .stat-main {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .stat-number {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
        }

        .stat-name {
            font-size: 0.65rem;
            color: #64748b;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Birthday Alert */
        .birthday-alert {
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            border-radius: 14px;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            color: white;
        }

        .birthday-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .birthday-list {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .birthday-item {
            background: rgba(255,255,255,0.2);
            padding: 0.3rem 0.6rem;
            border-radius: 40px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* Filter Section */
        .filter-section {
            background: white;
            border-radius: 14px;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .filter-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .filter-title i {
            color: #d97706;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.6rem;
        }

        .filter-item select, .filter-item input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.8rem;
        }

        .filter-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
            margin-top: 0.3rem;
        }

        .filter-actions button {
            padding: 0.6rem;
            border: none;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .btn-primary {
            background: #d97706;
            color: white;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #64748b;
        }

        /* Table - محسنة للهاتف */
        .table-container {
            background: white;
            border-radius: 14px;
            padding: 0.8rem;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
        }

        .table-header h3 {
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .table-header h3 i {
            color: #d97706;
        }

        .results-count {
            color: #64748b;
            font-size: 0.7rem;
        }

        .table-wrapper {
            overflow-x: auto;
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #f1f5f9;
            border-radius: 10px;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
            font-size: 0.75rem;
        }

        th {
            text-align: right;
            padding: 0.6rem 0.4rem;
            color: #64748b;
            font-weight: 600;
            font-size: 0.65rem;
            border-bottom: 2px solid #e2e8f0;
            background: #f8fafc;
            position: sticky;
            top: 0;
        }

        td {
            padding: 0.6rem 0.4rem;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        .badge {
            padding: 0.15rem 0.4rem;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge-success {
            background: #d1fae5;
            color: #10b981;
        }

        .badge-warning {
            background: #fef3c7;
            color: #d97706;
        }

        .btn-details {
            background: none;
            border: 1px solid #e2e8f0;
            padding: 0.2rem 0.5rem;
            border-radius: 5px;
            color: #64748b;
            cursor: pointer;
            font-size: 0.65rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            width: 95%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 1.2rem;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 0.8rem;
            left: 0.8rem;
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: #64748b;
        }

        .modal-header {
            text-align: center;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .modal-header h2 {
            font-size: 1.1rem;
            color: #0f172a;
        }

        .modal-header p {
            font-size: 0.85rem;
            color: #64748b;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
        }

        .info-item {
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 0.4rem;
        }

        .info-label {
            color: #64748b;
            font-size: 0.7rem;
            margin-bottom: 0.2rem;
        }

        .info-value {
            color: #0f172a;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Mobile Improvements */
        @media (max-width: 480px) {
            .kpi-grid {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .admin-badge span:not(i) {
                display: none;
            }
            .date-badge span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div class="login-container" id="loginPage">
        <div class="login-box">
            <div class="logo">e<span>concours</span>.ma</div>
            <div class="hadith">"الله في عون العبد ما دام العبد في عون أخيه"</div>
            <h2>لوحة التحكم</h2>
            <input type="password" id="passwordInput" placeholder="••••" maxlength="4">
            <button onclick="checkPassword()">دخول</button>
            <div class="error-message" id="errorMessage">رمز الدخول غير صحيح</div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard-container" id="dashboard">
        <div class="main-header">
            <div class="header-logo">
                <div class="logo">e<span>concours</span>.ma</div>
                <div class="admin-badge" id="adminBadge">
                    <i class="fas fa-user-circle"></i>
                    <span id="adminName">...</span>
                </div>
            </div>
            <div class="header-info">
                <div class="date-badge" id="dateDisplay">
                    <i class="fas fa-calendar-alt"></i>
                    <span id="currentDate"></span>
                </div>
                <button class="logout-btn" onclick="logout()">خروج</button>
            </div>
        </div>

        <div class="main-content">
            <!-- KPI Cards -->
            <div class="kpi-grid" id="kpiGrid"></div>

            <!-- Stats Grid -->
            <div class="stats-grid" id="statsGrid"></div>

            <!-- Birthday Alert -->
            <div class="birthday-alert" id="birthdayAlert">
                <div class="birthday-info">
                    <i class="fas fa-cake-candles"></i>
                    <span>أعياد الميلاد القريبة</span>
                </div>
                <div class="birthday-list" id="birthdayList"></div>
            </div>

            <!-- Filter Section -->
            <div class="filter-section">
                <div class="filter-title">
                    <i class="fas fa-filter"></i>
                    <span>فلترة البيانات</span>
                </div>
                <div class="filter-grid">
                    <div class="filter-item">
                        <select id="filterService">
                            <option value="all">جميع الخدمات</option>
                            <option value="تسجيل فوري">تسجيل فوري</option>
                            <option value="اشتراك 6 أشهر">اشتراك 6 أشهر</option>
                            <option value="اشتراك 12 شهر">اشتراك 12 شهر</option>
                            <option value="تسجيل مجاني">تسجيل مجاني</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <select id="filterCity">
                            <option value="all">جميع المدن</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <select id="filterDegree">
                            <option value="all">جميع الشهادات</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <input type="text" id="filterName" placeholder="بحث بالاسم...">
                    </div>
                    <div class="filter-actions">
                        <button class="btn-primary" onclick="applyFilters()">تطبيق</button>
                        <button class="btn-secondary" onclick="resetFilters()">إعادة</button>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="table-container">
                <div class="table-header">
                    <h3><i class="fas fa-users"></i> المسجلين</h3>
                    <span class="results-count" id="resultsCount"></span>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>الاسم</th>
                                <th>الفرنسية</th>
                                <th>الميلاد</th>
                                <th>المدينة</th>
                                <th>الخدمة</th>
                                <th>التسجيل</th>
                                <th>واتساب</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="detailsModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✖</button>
            <div class="modal-header">
                <h2 id="modalName"></h2>
                <p id="modalNameFr"></p>
            </div>
            <div class="info-grid" id="modalContent"></div>
        </div>
    </div>

    <script>
        const admins = { "1280": "رضا السايح", "1997": "أيمن ممدوح" };
        let currentAdmin = "";
        let registrations = [];
        let currentData = [];

        async function loadData() {
            try {
                const response = await fetch('data.json');
                registrations = await response.json();
                currentData = [...registrations];
                if (document.getElementById('dashboard').classList.contains('active')) {
                    updateDashboard();
                }
            } catch (error) {
                console.error('خطأ:', error);
            }
        }

        function updateDashboard() {
            displayKPIs();
            displayStats();
            displayBirthdays();
            initFilters();
            displayTable(currentData);
        }

        function calculateAge(birthDate) {
            const today = new Date();
            const birth = new Date(birthDate);
            let age = today.getFullYear() - birth.getFullYear();
            const monthDiff = today.getMonth() - birth.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) age--;
            return age;
        }

        function daysUntilBirthday(birthDate) {
            const today = new Date();
            const birth = new Date(birthDate);
            const nextBirthday = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
            if (today > nextBirthday) nextBirthday.setFullYear(today.getFullYear() + 1);
            return Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));
        }

        function displayKPIs() {
            if (!registrations.length) return;
            
            const total = registrations.length;
            const thisMonth = registrations.filter(r => {
                const regDate = new Date(r.regDate);
                const now = new Date();
                return regDate.getMonth() === now.getMonth() && regDate.getFullYear() === now.getFullYear();
            }).length;
            
            const free = registrations.filter(r => r.service === "تسجيل مجاني").length;
            const cities = [...new Set(registrations.map(r => r.city))].length;
            
            const lastMonth = registrations.filter(r => {
                const regDate = new Date(r.regDate);
                const now = new Date();
                const lastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                return regDate >= lastMonth && regDate < new Date(now.getFullYear(), now.getMonth(), 1);
            }).length;
            
            const growth = lastMonth ? (((thisMonth - lastMonth) / lastMonth) * 100).toFixed(1) : 0;

            document.getElementById('kpiGrid').innerHTML = `
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon"><i class="fas fa-users"></i></div>
                        <div class="kpi-value">${total}</div>
                    </div>
                    <div class="kpi-label">إجمالي المسجلين</div>
                    <span class="kpi-trend"><i class="fas fa-arrow-up"></i> ${growth}%</span>
                </div>
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon"><i class="fas fa-calendar-check"></i></div>
                        <div class="kpi-value">${thisMonth}</div>
                    </div>
                    <div class="kpi-label">هذا الشهر</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon"><i class="fas fa-hand-holding-heart"></i></div>
                        <div class="kpi-value">${free}</div>
                    </div>
                    <div class="kpi-label">تسجيل مجاني</div>
                    <span class="kpi-trend">${((free/total)*100).toFixed(1)}%</span>
                </div>
                <div class="kpi-card">
                    <div class="kpi-header">
                        <div class="kpi-icon"><i class="fas fa-city"></i></div>
                        <div class="kpi-value">${cities}</div>
                    </div>
                    <div class="kpi-label">مدن مختلفة</div>
                </div>
            `;
        }

        function displayStats() {
            if (!registrations.length) return;
            
            const ages = registrations.map(r => ({ 
                age: calculateAge(r.birthDate), 
                name: r.nameAr 
            }));
            
            const minAge = Math.min(...ages.map(a => a.age));
            const maxAge = Math.max(...ages.map(a => a.age));
            
            const youngest = ages.find(a => a.age === minAge);
            const oldest = ages.find(a => a.age === maxAge);

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-title"><i class="fas fa-child"></i> أصغر مسجل</div>
                    <div class="stat-main">
                        <span class="stat-number">${minAge}</span>
                        <span class="stat-name">${youngest.name}</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title"><i class="fas fa-user-tie"></i> أكبر مسجل</div>
                    <div class="stat-main">
                        <span class="stat-number">${maxAge}</span>
                        <span class="stat-name">${oldest.name}</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title"><i class="fas fa-calendar-alt"></i> معدل الأعمار</div>
                    <div class="stat-main">
                        <span class="stat-number">${(ages.reduce((a, b) => a + b.age, 0) / ages.length).toFixed(1)}</span>
                        <span class="stat-name">سنة</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-title"><i class="fas fa-graduation-cap"></i> إجمالي الشهادات</div>
                    <div class="stat-main">
                        <span class="stat-number">${registrations.reduce((sum, r) => sum + (r.degrees ? r.degrees.split(',').length : 1), 0)}</span>
                        <span class="stat-name">شهادة</span>
                    </div>
                </div>
            `;
        }

        function displayBirthdays() {
            const upcoming = registrations
                .map(r => ({...r, days: daysUntilBirthday(r.birthDate)}))
                .filter(r => r.days <= 30)
                .sort((a, b) => a.days - b.days)
                .slice(0, 5);

            const list = document.getElementById('birthdayList');
            
            if (upcoming.length === 0) {
                list.innerHTML = '<div class="birthday-item">لا توجد أعياد قريبة</div>';
                return;
            }

            list.innerHTML = upcoming.map(r => `
                <div class="birthday-item">
                    <i class="fas fa-cake-candles"></i>
                    <span>${r.nameAr.split(' ')[0]}</span>
                    <span style="background:rgba(255,255,255,0.3); padding:0.1rem 0.3rem; border-radius:20px;">${r.days}</span>
                </div>
            `).join('');
        }

        function initFilters() {
            const cities = [...new Set(registrations.map(r => r.city))].sort();
            const degrees = [...new Set(registrations.flatMap(r => r.degrees ? r.degrees.split(',').map(d => d.trim()) : []))].sort();
            
            const citySelect = document.getElementById('filterCity');
            const degreeSelect = document.getElementById('filterDegree');
            
            citySelect.innerHTML = '<option value="all">جميع المدن</option>';
            degreeSelect.innerHTML = '<option value="all">جميع الشهادات</option>';
            
            cities.forEach(city => {
                citySelect.innerHTML += `<option value="${city}">${city}</option>`;
            });
            
            degrees.forEach(degree => {
                degreeSelect.innerHTML += `<option value="${degree}">${degree}</option>`;
            });
        }

        function displayTable(data) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('resultsCount').textContent = `عرض ${data.length} من ${registrations.length}`;
            
            tbody.innerHTML = data.map((r, i) => {
                const serviceClass = r.service === 'تسجيل مجاني' ? 'badge-success' : 'badge-warning';
                return `
                    <tr>
                        <td>${i+1}</td>
                        <td>${r.nameAr}</td>
                        <td>${r.nameFr}</td>
                        <td>${r.birthDate}</td>
                        <td>${r.city}</td>
                        <td><span class="badge ${serviceClass}">${r.service}</span></td>
                        <td>${r.regDate}</td>
                        <td>${r.whatsapp}</td>
                        <td><button class="btn-details" onclick='showDetails(${JSON.stringify(r).replace(/'/g, "\\'")})'><i class="fas fa-eye"></i></button></td>
                    </tr>
                `;
            }).join('');
        }

        function applyFilters() {
            const service = document.getElementById('filterService').value;
            const city = document.getElementById('filterCity').value;
            const degree = document.getElementById('filterDegree').value;
            const name = document.getElementById('filterName').value.toLowerCase();

            currentData = registrations.filter(r => {
                if (service !== 'all' && r.service !== service) return false;
                if (city !== 'all' && r.city !== city) return false;
                if (degree !== 'all') {
                    const degrees = r.degrees ? r.degrees.split(',').map(d => d.trim()) : [];
                    if (!degrees.includes(degree)) return false;
                }
                if (name && !r.nameAr.includes(name) && !r.nameFr.toLowerCase().includes(name)) return false;
                return true;
            });

            displayTable(currentData);
        }

        function resetFilters() {
            document.getElementById('filterService').value = 'all';
            document.getElementById('filterCity').value = 'all';
            document.getElementById('filterDegree').value = 'all';
            document.getElementById('filterName').value = '';
            currentData = [...registrations];
            displayTable(currentData);
        }

        function showDetails(p) {
            document.getElementById('modalName').textContent = p.nameAr;
            document.getElementById('modalNameFr').textContent = p.nameFr;
            
            const degrees = p.degrees ? p.degrees.split(',').map(d => d.trim()).join('، ') : 'غير محدد';
            
            document.getElementById('modalContent').innerHTML = `
                <div class="info-item"><div class="info-label">رقم البطاقة</div><div class="info-value">${p.cin}</div></div>
                <div class="info-item"><div class="info-label">مكان الإزدياد</div><div class="info-value">${p.birthPlace}</div></div>
                <div class="info-item"><div class="info-label">العنوان</div><div class="info-value">${p.address}</div></div>
                <div class="info-item"><div class="info-label">البريد</div><div class="info-value">${p.email}</div></div>
                <div class="info-item"><div class="info-label">الشهادات</div><div class="info-value">${degrees}</div></div>
                <div class="info-item"><div class="info-label">المدرسة</div><div class="info-value">${p.school}</div></div>
                <div class="info-item"><div class="info-label">العمر</div><div class="info-value">${calculateAge(p.birthDate)} سنة</div></div>
                <div class="info-item"><div class="info-label">الخدمة</div><div class="info-value">${p.service}</div></div>
            `;
            
            document.getElementById('detailsModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailsModal').classList.remove('active');
        }

        function updateDate() {
            const today = new Date();
            document.getElementById('currentDate').textContent = today.toLocaleDateString('ar-MA', { day: 'numeric', month: 'numeric' });
        }

        function checkPassword() {
            const code = document.getElementById('passwordInput').value;
            
            if (admins[code]) {
                currentAdmin = admins[code];
                document.getElementById('adminName').textContent = currentAdmin;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').classList.add('active');
                loadData();
                updateDate();
                setInterval(updateDate, 60000);
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('passwordInput').value = '';
            document.getElementById('errorMessage').style.display = 'none';
        }

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
