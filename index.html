<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Smart Job Matcher | ECONCONCOURS.MA</title>
  <style>
    /* ----- RESET & GLOBAL ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #f9fafb;
      color: #111827;
      line-height: 1.5;
    }

    /* smooth scroll behavior */
    html {
      scroll-behavior: smooth;
    }

    /* container */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ----- HEADER (modern SaaS) ----- */
    .site-header {
      background: white;
      border-bottom: 1px solid #eef2f6;
      padding: 1rem 0;
      position: sticky;
      top: 0;
      backdrop-filter: blur(8px);
      background: rgba(255, 255, 255, 0.92);
      z-index: 10;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo h2 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #0f2b3d, #1b4a6e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .logo span {
      font-size: 0.85rem;
      font-weight: 400;
      color: #5c6f87;
      display: block;
    }

    /* language toggle modern */
    .lang-switch {
      display: flex;
      gap: 0.5rem;
      background: #f1f5f9;
      padding: 0.25rem;
      border-radius: 3rem;
    }

    .lang-btn {
      background: transparent;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #334155;
      box-shadow: none;
    }

    .lang-btn.active {
      background: white;
      color: #0f2b3d;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .lang-btn:hover:not(.active) {
      background: #e6edf4;
    }

    /* HERO SECTION */
    .hero-section {
      padding: 3rem 0 2.5rem;
      text-align: center;
    }

    .hero-title {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(145deg, #0b2b38, #1d4a6e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      max-width: 800px;
      margin: 0 auto 1rem;
      letter-spacing: -0.02em;
    }

    .hero-desc {
      font-size: 1.2rem;
      color: #4b5565;
      max-width: 650px;
      margin: 0 auto 2rem;
    }

    /* enhanced form card */
    .form-card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0,0,0,0.02);
      padding: 2rem;
      transition: transform 0.2s ease;
      margin-bottom: 2rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.8rem;
      margin-bottom: 1.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .input-group label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #1e2f44;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .input-group input,
    .input-group textarea {
      padding: 0.9rem 1.2rem;
      border-radius: 1.2rem;
      border: 1.5px solid #e2edf2;
      background: #ffffff;
      font-size: 1rem;
      transition: all 0.2s;
      font-family: inherit;
    }

    .input-group input:focus,
    .input-group textarea:focus {
      outline: none;
      border-color: #2c7da0;
      box-shadow: 0 0 0 3px rgba(44,125,160,0.12);
    }

    textarea {
      min-height: 95px;
      resize: vertical;
    }

    /* primary button */
    .btn-primary {
      background: linear-gradient(105deg, #1f5e7e, #1a4b6e);
      color: white;
      border: none;
      padding: 1rem 1.8rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.25s;
      width: 100%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 18px -8px rgba(27, 74, 110, 0.4);
      background: linear-gradient(105deg, #146b8a, #12466b);
    }

    /* results section */
    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin: 2rem 0 1.5rem;
    }

    .results-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0f2b3d;
    }

    .results-badge {
      background: #e9f0f5;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #1f5e7e;
    }

    /* modern card grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 2rem;
    }

    .company-card {
      background: white;
      border-radius: 1.8rem;
      padding: 1.5rem;
      transition: all 0.25s ease;
      border: 1px solid #eef2f8;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.02);
      position: relative;
    }

    .company-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
      border-color: #dce5ed;
    }

    .best-match {
      border-left: 5px solid #f5b042;
      background: linear-gradient(115deg, #ffffff, #fffcf5);
      box-shadow: 0 12px 22px -12px rgba(245,176,66,0.15);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      align-items: baseline;
      margin-bottom: 1rem;
    }

    .company-name {
      font-size: 1.4rem;
      font-weight: 800;
      color: #1a2c3e;
      letter-spacing: -0.3px;
    }

    .match-score {
      background: #dff1ff;
      padding: 0.25rem 0.8rem;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 0.8rem;
      color: #1a6c8f;
    }

    .company-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      margin: 0.8rem 0;
      font-size: 0.85rem;
      color: #4a5b6e;
    }

    .company-meta span {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .reason-card {
      background: #f8fafd;
      padding: 0.8rem 1rem;
      border-radius: 1.2rem;
      margin: 1rem 0;
      font-size: 0.85rem;
      border-left: 3px solid #2c7da0;
      color: #2c4559;
    }

    .contact-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin: 1rem 0;
    }

    .contact-link {
      background: #f0f4f9;
      padding: 0.4rem 0.9rem;
      border-radius: 2rem;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      color: #1e4a6e;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .contact-link:hover {
      background: #e3eaf1;
      transform: translateY(-1px);
    }

    .action-group {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }

    .btn-outline {
      background: white;
      border: 1.5px solid #cbdde9;
      border-radius: 2rem;
      padding: 0.6rem 1rem;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      text-align: center;
      color: #1e4663;
    }

    .btn-outline:hover {
      background: #f1f7fc;
      border-color: #9bb7cd;
      transform: translateY(-1px);
    }

    .btn-solid {
      background: #22668d;
      border: none;
      border-radius: 2rem;
      padding: 0.6rem 1rem;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      text-align: center;
      color: white;
    }

    .btn-solid:hover {
      background: #0f4b6e;
      transform: translateY(-1px);
      box-shadow: 0 5px 10px rgba(0,0,0,0.05);
    }

    .generated-message-box {
      margin-top: 1rem;
      background: #fef7e0;
      padding: 0.9rem;
      border-radius: 1.2rem;
      font-size: 0.8rem;
      line-height: 1.45;
      border: 1px solid #fbe5b9;
      color: #2f3e2c;
      word-break: break-word;
    }

    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid white;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
      margin-right: 5px;
    }

    @keyframes spin {
      to { transform: rotate(360deg);}
    }

    footer {
      margin-top: 4rem;
      padding: 1.5rem 0;
      border-top: 1px solid #e4edf2;
      text-align: center;
      font-size: 0.8rem;
      color: #6c7c8b;
    }

    /* RTL support */
    body.rtl {
      direction: rtl;
      text-align: right;
    }
    body.rtl .reason-card {
      border-left: none;
      border-right: 3px solid #2c7da0;
    }
    body.rtl .best-match {
      border-left: none;
      border-right: 5px solid #f5b042;
    }
    body.rtl .lang-switch {
      direction: ltr;
    }

    @media (max-width: 768px) {
      .container {
        padding: 0 1.2rem;
      }
      .hero-title {
        font-size: 2rem;
      }
      .form-card {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
<header class="site-header">
  <div class="container header-inner">
    <div class="logo">
      <h2>ECONCONCOURS.MA <span>Smart Job Matcher</span></h2>
    </div>
    <div class="lang-switch">
      <button class="lang-btn" data-lang="fr">🇫🇷 FR</button>
      <button class="lang-btn" data-lang="ar">🇲🇦 عربي</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="hero-section">
    <h1 class="hero-title" id="mainTitle">Find Companies That Match Your Profile</h1>
    <p class="hero-desc" id="mainDesc">AI-powered matching • Connect with top Moroccan companies • Ready-to-send professional messages</p>
  </div>

  <div class="form-card">
    <form id="matchForm">
      <div class="form-grid">
        <div class="input-group">
          <label id="labelFullName">👤 Full Name</label>
          <input type="text" id="fullName" placeholder="Karim Benjelloun" required>
        </div>
        <div class="input-group">
          <label id="labelDiploma">🎓 Diploma / Degree</label>
          <input type="text" id="diploma" placeholder="Master in Marketing, Bac+3 ..." required>
        </div>
        <div class="input-group">
          <label id="labelCity">📍 City</label>
          <input type="text" id="city" placeholder="Casablanca, Rabat, Tangier" required>
        </div>
        <div class="input-group">
          <label id="labelSkills">⚙️ Skills (comma separated)</label>
          <textarea id="skills" placeholder="JavaScript, Project Management, Communication, Excel, Social Media" required></textarea>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="matchBtnText">🔍 Find my best matches →</button>
    </form>
  </div>

  <div id="resultsSection" style="display: none;">
    <div class="results-header">
      <div class="results-title" id="resultTitle">✨ Recommended Companies</div>
      <div class="results-badge" id="resultCount"></div>
    </div>
    <div id="cardsContainer" class="cards-grid"></div>
  </div>

  <footer>
    <p id="footerText">Smart Job Matcher — Connect with opportunities across Morocco. © ECONCONCOURS.MA</p>
  </footer>
</div>

<script>
  // ---------- translations (same functionality, improved design) ----------
  const translations = {
    fr: {
      mainTitle: "Trouvez les entreprises qui correspondent à votre profil",
      mainDesc: "Matching intelligent • Connectez-vous aux meilleures entreprises marocaines • Messages professionnels prêts à envoyer",
      labelFullName: "👤 Nom complet",
      labelDiploma: "🎓 Diplôme",
      labelCity: "📍 Ville",
      labelSkills: "⚙️ Compétences (séparez par des virgules)",
      matchBtn: "🔍 Trouver mes meilleures correspondances →",
      resultTitle: "✨ Entreprises recommandées",
      footer: "Smart Job Matcher — Connectez-vous aux opportunités au Maroc. © ECONCONCOURS.MA",
      noMatch: "⚠️ Aucune correspondance trouvée. Élargissez vos compétences ou votre ville.",
      matchPercent: "% match",
      sector: "Secteur",
      cityLabel: "Ville",
      whyMatch: "Pourquoi cette entreprise",
      generateEmail: "✉️ Générer l'email",
      copyEmail: "📋 Copier l'email",
      copied: "✅ Copié !",
      generateFirst: "Veuillez d'abord générer l'email",
      loading: "Génération...",
      readyMsgTitle: "💬 Message prêt à envoyer",
      emailBody: (user, company, skillsStr) => {
        return `📧 Objet : Candidature spontanée - Poste adapté\n\nBonjour l'équipe de ${company.name},\n\nJe me permets de vous adresser ma candidature suite à la recommandation du service Smart Job Matcher d'ECONCONCOURS.MA.\n\n👤 Je m'appelle ${user.fullName}, titulaire d'un(e) ${user.diploma}. Basé(e) à ${user.city}, je maîtrise : ${skillsStr}.\n\n🔎 Votre entreprise (secteur : ${company.sector}) recherche des profils avec des compétences comme ${company.required_skills.slice(0,3).join(', ')}. Notre matching indique une forte compatibilité.\n\n📞 Très motivé, je serais ravi d'échanger. Merci pour votre attention.\n\nCordialement,\n${user.fullName}`
      },
      fillAllFields: "Veuillez remplir tous les champs.",
      atLeastOneSkill: "Ajoutez au moins une compétence."
    },
    ar: {
      mainTitle: "ابحث عن الشركات التي تناسب ملفك الشخصي",
      mainDesc: "مطابقة ذكية • تواصل مع أفضل الشركات المغربية • رسائل مهنية جاهزة للإرسال",
      labelFullName: "👤 الاسم الكامل",
      labelDiploma: "🎓 الشهادة",
      labelCity: "📍 المدينة",
      labelSkills: "⚙️ المهارات (افصل بينها بفواصل)",
      matchBtn: "🔍 ابحث عن أفضل التطابقات ←",
      resultTitle: "✨ الشركات الموصى بها",
      footer: "سمارت ماتشر — تواصل مع الفرص في المغرب. © ECONCONCOURS.MA",
      noMatch: "⚠️ لم يتم العثور على تطابقات. وسّع مهاراتك أو مدينتك.",
      matchPercent: "% تطابق",
      sector: "القطاع",
      cityLabel: "المدينة",
      whyMatch: "لماذا هذه الشركة",
      generateEmail: "✉️ إنشاء البريد",
      copyEmail: "📋 نسخ البريد",
      copied: "✅ تم النسخ!",
      generateFirst: "يرجى إنشاء البريد أولاً",
      loading: "جاري الإنشاء...",
      readyMsgTitle: "💬 الرسالة جاهزة",
      emailBody: (user, company, skillsStr) => {
        return `📧 الموضوع: طلب توظيف تلقائي\n\nفريق ${company.name}،\n\nأتقدم لكم بطلبي بعد توصية من سمارت ماتشر التابعة لـ ECONCONCOURS.MA.\n\n👤 أنا ${user.fullName}، حاصل على ${user.diploma}. مقيم في ${user.city}، أمتلك مهارات: ${skillsStr}.\n\n🔎 تعمل شركتكم في قطاع ${company.sector} وتبحث عن مهارات مثل ${company.required_skills.slice(0,3).join(', ')}. أظهر المطابقة توافقاً كبيراً.\n\n📞 متحمس للمساهمة، أتطلع إلى ردكم الكريم.\n\nمع الاحترام،\n${user.fullName}`
      },
      fillAllFields: "يرجى ملء جميع الحقول.",
      atLeastOneSkill: "أدخل مهارة واحدة على الأقل."
    }
  };

  let currentLang = 'fr';
  let companiesData = [];
  let currentMatches = [];
  let lastProfile = null;

  // DOM elements
  const form = document.getElementById('matchForm');
  const resultsSection = document.getElementById('resultsSection');
  const cardsContainer = document.getElementById('cardsContainer');
  const resultCountSpan = document.getElementById('resultCount');
  const resultTitleSpan = document.getElementById('resultTitle');

  function applyLanguage() {
    const t = translations[currentLang];
    document.getElementById('mainTitle').innerHTML = t.mainTitle;
    document.getElementById('mainDesc').innerHTML = t.mainDesc;
    document.getElementById('labelFullName').innerHTML = t.labelFullName;
    document.getElementById('labelDiploma').innerHTML = t.labelDiploma;
    document.getElementById('labelCity').innerHTML = t.labelCity;
    document.getElementById('labelSkills').innerHTML = t.labelSkills;
    document.getElementById('matchBtnText').innerHTML = t.matchBtn;
    document.getElementById('resultTitle').innerHTML = t.resultTitle;
    document.getElementById('footerText').innerHTML = t.footer;
    document.querySelectorAll('.lang-btn').forEach(btn => {
      if(btn.getAttribute('data-lang') === currentLang) btn.classList.add('active');
      else btn.classList.remove('active');
    });
    if(currentLang === 'ar') document.body.classList.add('rtl');
    else document.body.classList.remove('rtl');

    if(resultsSection.style.display === 'block' && currentMatches.length) {
      renderResults(currentMatches, lastProfile);
    } else if(resultsSection.style.display === 'block' && (!currentMatches.length)) {
      cardsContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; background:white; border-radius:2rem; padding:2.5rem;">${t.noMatch}</div>`;
    }
  }

  function parseSkills(str) {
    return str.split(',').map(s=>s.trim().toLowerCase()).filter(s=>s);
  }

  function computeDetails(userSkills, companySkills) {
    if(!companySkills.length) return {score:0, matched:[]};
    const lowerReq = companySkills.map(s=>s.toLowerCase());
    const matched = userSkills.filter(s=> lowerReq.includes(s));
    let score = (matched.length/companySkills.length)*100;
    return {score: Math.min(100, Math.round(score)), matched};
  }

  function getTopMatches(userCity, userSkills, allCompanies) {
    const enriched = allCompanies.map(c => {
      const {score, matched} = computeDetails(userSkills, c.required_skills);
      const sameCity = c.city.toLowerCase() === userCity.toLowerCase();
      return {...c, matchScore: score, matchedSkills: matched, sameCity};
    });
    enriched.sort((a,b)=> {
      if(a.sameCity !== b.sameCity) return a.sameCity ? -1 : 1;
      return b.matchScore - a.matchScore;
    });
    return enriched.slice(0,5);
  }

  function generateEmail(user, company) {
    const t = translations[currentLang];
    const skillsStr = user.skillsArray.slice(0,4).join(', ');
    return t.emailBody(user, company, skillsStr);
  }

  function escapeHtml(str) {
    if(!str) return '';
    return str.replace(/[&<>]/g, function(m){
      if(m==='&') return '&amp;';
      if(m==='<') return '&lt;';
      if(m==='>') return '&gt;';
      return m;
    });
  }

  function renderResults(companies, userProfile) {
    const t = translations[currentLang];
    if(!companies.length) {
      cardsContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; background:white; border-radius:2rem; padding:2.5rem;">${t.noMatch}</div>`;
      resultsSection.style.display = 'block';
      resultCountSpan.innerText = '(0)';
      return;
    }
    resultCountSpan.innerText = `(${companies.length})`;
    let html = '';
    companies.forEach((co, idx) => {
      const isBest = idx===0 && co.matchScore>0;
      const reasonText = co.sameCity ? `✓ Same city (${co.city}) · ${co.matchedSkills.length} shared skills: ${co.matchedSkills.slice(0,3).join(', ')}` : `✔️ ${co.matchedSkills.length} matching skills: ${co.matchedSkills.slice(0,3).join(', ')} · different city but strong profile.`;
      const bestClass = isBest ? 'best-match' : '';
      html += `
        <div class="company-card ${bestClass}">
          <div class="card-header">
            <div class="company-name">${escapeHtml(co.name)}</div>
            <div class="match-score">🎯 ${co.matchScore}${t.matchPercent}</div>
          </div>
          <div class="company-meta">
            <span>📁 ${t.sector}: ${escapeHtml(co.sector)}</span>
            <span>📍 ${t.cityLabel}: ${escapeHtml(co.city)}</span>
          </div>
          <div class="reason-card"><strong>${t.whyMatch}</strong><br>${escapeHtml(reasonText)}</div>
          <div class="contact-buttons">
            <a href="mailto:${escapeHtml(co.email)}" class="contact-link">📧 ${escapeHtml(co.email)}</a>
            <a href="tel:${escapeHtml(co.phone)}" class="contact-link">📞 ${escapeHtml(co.phone)}</a>
          </div>
          <div class="action-group">
            <button class="btn-solid gen-email-btn" data-company='${JSON.stringify(co)}' data-user='${JSON.stringify(userProfile)}'>${t.generateEmail}</button>
            <button class="btn-outline copy-btn" data-email-message="">${t.copyEmail}</button>
          </div>
          <div class="generated-message-box" id="msg-${idx}" style="display:none;"></div>
        </div>
      `;
    });
    cardsContainer.innerHTML = html;

    // attach events
    document.querySelectorAll('.gen-email-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const co = JSON.parse(btn.getAttribute('data-company'));
        const usr = JSON.parse(btn.getAttribute('data-user'));
        const card = btn.closest('.company-card');
        const msgDiv = card.querySelector('.generated-message-box');
        const original = btn.innerHTML;
        btn.innerHTML = `<span class="loader"></span> ${t.loading}`;
        btn.disabled = true;
        setTimeout(() => {
          const emailMsg = generateEmail(usr, co);
          msgDiv.style.display = 'block';
          msgDiv.innerHTML = `<strong>${t.readyMsgTitle}</strong><br><br>${escapeHtml(emailMsg).replace(/\n/g, '<br>')}`;
          btn.innerHTML = original;
          btn.disabled = false;
          const copyBtn = card.querySelector('.copy-btn');
          if(copyBtn) copyBtn.setAttribute('data-email-message', emailMsg);
        }, 200);
      });
    });

    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const card = btn.closest('.company-card');
        let message = btn.getAttribute('data-email-message');
        if(!message) {
          const msgDiv = card.querySelector('.generated-message-box');
          if(msgDiv && msgDiv.innerText) message = msgDiv.innerText.replace(/💬.*:/,'').trim();
        }
        if(!message) { alert(t.generateFirst); return; }
        try {
          await navigator.clipboard.writeText(message);
          const orig = btn.innerHTML;
          btn.innerHTML = t.copied;
          setTimeout(()=> btn.innerHTML = orig, 1500);
        } catch(e) {}
      });
    });
  }

  async function handleSubmit(e) {
    e.preventDefault();
    const fullName = document.getElementById('fullName').value.trim();
    const diploma = document.getElementById('diploma').value.trim();
    const city = document.getElementById('city').value.trim();
    const skillsRaw = document.getElementById('skills').value.trim();
    const t = translations[currentLang];
    if(!fullName || !diploma || !city || !skillsRaw) { alert(t.fillAllFields); return; }
    const skillsArr = parseSkills(skillsRaw);
    if(!skillsArr.length) { alert(t.atLeastOneSkill); return; }
    const profile = { fullName, diploma, city, skillsArray: skillsArr };
    if(!companiesData.length) { alert("Loading data, please retry"); return; }
    const matches = getTopMatches(city, skillsArr, companiesData);
    currentMatches = matches;
    lastProfile = profile;
    renderResults(matches, profile);
    resultsSection.style.display = 'block';
    resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
